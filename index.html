<!DOCTYPE html>
<html lang="ko" translate="no" class="notranslate">
<head>
<meta charset="UTF-8">
<meta name="google" content="notranslate">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#185FA5">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>손해평가 피해율계산기</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<!-- UPDATED -->
<style>
:root{
  --blue:#185FA5;--blue2:#378ADD;
  --border:#D8D6CE;--text:#1a1a1a;--sub:#666;--hint:#aaa;
  --bg:#F5F4F0;--card:#fff;--green:#1D9E75;--red:#e24b4a;
  --r:12px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;-webkit-user-select:none;user-select:none;padding-bottom:env(safe-area-inset-bottom,50px)!important}
.notranslate{translate:no!important}

.header{background:var(--blue);color:white;padding:16px 16px 14px;display:flex;align-items:center;gap:10px}
.header-icon{width:32px;height:32px;background:rgba(255,255,255,0.2);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px}
.header h1{font-size:17px;font-weight:700;flex:1}
.header-sub{font-size:11px;opacity:0.7;margin-top:2px}
.help-btn{height:30px;padding:0 10px;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);border-radius:8px;color:white;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;white-space:nowrap}

.tab-bar{display:flex;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.tab{flex:1;padding:11px 2px 10px;text-align:center;font-size:12px;font-weight:600;color:var(--hint);border-bottom:2.5px solid transparent;cursor:pointer;touch-action:manipulation;transition:color 0.2s,background 0.2s,border-color 0.2s;border-radius:0}
.tab.on{color:var(--blue);border-bottom-color:var(--blue);background:#EBF4FF}

.tab-slider-wrap{overflow:hidden;width:100%}
.tab-slider{display:flex;transition:transform 0.32s cubic-bezier(0.4,0,0.2,1);will-change:transform}
.tab-content{flex:0 0 100%;width:100%;padding:16px 14px;box-sizing:border-box}

.crop-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.crop-card{background:var(--card);border-radius:var(--r);padding:20px 14px;text-align:center;border:0.5px solid var(--border);cursor:pointer;position:relative;transition:transform 0.1s;touch-action:manipulation}
.crop-card:active{transform:scale(0.97)}
.crop-card.done{border-color:var(--green)}
.crop-card.ready{border-color:var(--blue)}
.crop-card.soon{opacity:0.55;cursor:default}
.crop-icon{font-size:22px;margin-bottom:10px;line-height:1.4;white-space:nowrap;letter-spacing:2px}
.crop-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:5px;letter-spacing:-0.02em}
.crop-desc{font-size:12px;color:var(--sub);font-weight:500}
.badge{position:absolute;top:10px;right:10px;font-size:9px;padding:2px 7px;border-radius:10px;font-weight:700}
.badge-done{background:#e8faf3;color:var(--green)}
.badge-new{background:#EBF4FF;color:var(--blue)}
.badge-soon{background:#f0f0f0;color:#bbb}

/* ── 저장목록 ── */
.hist-toolbar{display:flex;gap:8px;margin-bottom:14px;align-items:center}
.hist-filter-btn{height:32px;padding:0 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);color:var(--sub);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.15s;touch-action:manipulation}
.hist-filter-btn.on{background:var(--blue);border-color:var(--blue);color:white}
.hist-clear-btn{margin-left:auto;height:32px;padding:0 12px;border-radius:8px;border:1.5px solid #ffd0d0;background:#fff5f5;color:var(--red);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;touch-action:manipulation}

.hist-date-group{margin-bottom:18px}
.hist-date-label{font-size:12px;font-weight:700;color:var(--blue);margin-bottom:8px;padding:0 2px;display:flex;align-items:center;gap:6px}
.hist-date-label .cnt{background:#EBF4FF;color:var(--blue);border-radius:10px;padding:1px 7px;font-size:11px;font-weight:700}

/* 텍스트 행 (이전 날짜) */
.hist-item{background:var(--card);border-radius:var(--rs);padding:12px 14px;margin-bottom:8px;border:0.5px solid var(--border);display:flex;align-items:center;gap:12px;position:relative}
.hist-item-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.cat-밭작물{background:#f0faf4}
.cat-과수{background:#fff4e8}
.cat-논작물{background:#f0f6ff}
.hist-item-body{flex:1;min-width:0}
/* 공통 라벨 행 */
.lbl-row{display:flex;align-items:baseline;gap:5px;flex-wrap:wrap;margin-bottom:2px}
.lbl-crop{font-size:14px;font-weight:700;color:var(--text)}
.lbl-farm{font-size:14px;font-weight:700;color:var(--text)}
.lbl-date{font-size:14px;font-weight:700;color:var(--text)}
.lbl-sep{font-size:13px;font-weight:400;color:var(--hint)}
/* 피해율 */
.hist-item-pct{font-size:16px;font-weight:800;flex-shrink:0;text-align:right;min-width:60px;padding-right:28px}.hist-pct-pos{color:#E53935}.hist-pct-neg{color:var(--blue)}.hist-pct-none{color:var(--hint)}
.hist-item-del{position:absolute;top:8px;right:8px;width:22px;height:22px;background:#ffeaea;border-radius:50%;border:none;color:var(--red);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation}

/* 이미지 카드 (당일) */
.hist-img-card{background:var(--card);border-radius:var(--r);margin-bottom:10px;border:0.5px solid var(--border);overflow:hidden;position:relative;cursor:pointer;touch-action:manipulation;transition:transform 0.1s}
.hist-img-card:active{transform:scale(0.98)}
.hist-img-card img{width:100%;display:block;border-radius:var(--r) var(--r) 0 0}
.hist-img-card .img-placeholder{width:100%;height:160px;background:#f0f0ee;display:flex;align-items:center;justify-content:center;font-size:28px;border-radius:var(--r) var(--r) 0 0}
.hist-img-footer{padding:10px 12px 10px;display:flex;align-items:center;gap:10px}
.hist-img-footer .img-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.hist-img-footer .img-body{flex:1;min-width:0}
.hist-img-footer .img-pct{font-size:16px;font-weight:800;flex-shrink:0;padding-right:30px;text-align:right;min-width:60px}
.hist-img-del{position:absolute;top:8px;right:8px;width:26px;height:26px;background:rgba(0,0,0,0.45);border-radius:50%;border:none;color:white;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;z-index:2}

/* 이미지 전체보기 모달 */
#img-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:600;overflow:hidden;touch-action:none}
#img-modal.show{display:block}
#img-modal-close{position:absolute;top:16px;right:16px;width:38px;height:38px;background:rgba(255,255,255,0.18);border:none;border-radius:50%;color:white;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;touch-action:manipulation}
#img-modal-hint{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.45);font-size:12px;white-space:nowrap;z-index:10;pointer-events:none}
#img-zoom-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
#img-modal-src{max-width:100%;max-height:100%;object-fit:contain;transform-origin:center center;user-select:none;-webkit-user-select:none;display:block}

.hist-empty{text-align:center;padding:50px 20px;color:var(--hint);font-size:13px;line-height:2}
.hist-empty-icon{font-size:40px;margin-bottom:12px}

#confirm-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:500;align-items:center;justify-content:center}
#confirm-modal.show{display:flex}
.confirm-box{background:white;border-radius:var(--r);padding:24px 20px;text-align:center;width:270px}
.confirm-box p{font-size:14px;color:var(--sub);margin-bottom:18px;line-height:1.6}
.confirm-btns{display:flex;gap:8px}
.confirm-btns button{flex:1;height:42px;border:none;border-radius:var(--rs);font-size:14px;font-weight:600;cursor:pointer}
.btn-cancel-m{background:#f0f0f0;color:var(--sub)}
.btn-del-m{background:var(--red);color:white}
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🌿</div>
  <div style="flex:1">
    <h1>손해평가 피해율계산기</h1>
    <div class="header-sub">농업재해보험 손해평가사 전용</div>

    <span style="font-size:13px;font-weight:600">도움말</span>

<div class="tab-bar">

<!-- 탭 슬라이더 -->
<div class="tab-slider-wrap">

<!-- ① 밭작물 -->

      <div class="crop-name">양파</div>
      <div class="crop-desc">수확량 조사</div>
    </div>
    <div class="crop-card done" onclick="go('bean')">
      <span class="badge badge-done">완성</span>
      <div class="crop-icon"><span style="filter:grayscale(1) brightness(0) contrast(1)">🫘</span></div>

<!-- ④ 저장목록 -->

    <button class="hist-filter-btn on" id="filter-all"   onclick="setFilter('all')">전체</button>
    <button class="hist-filter-btn"    id="filter-today" onclick="setFilter('today')">오늘</button>

</div><!-- /tab-slider -->
</div><!-- /tab-slider-wrap -->

<!-- 이미지 전체보기 모달 (핀치줌+드래그) -->

  <button id="img-modal-close" onclick="closeImgModal()">✕</button>

    <img id="img-modal-src" src="" alt="저장 이미지">

    <div class="confirm-btns">
      <button class="btn-cancel-m" onclick="closeConfirm()">취소</button>
      <button class="btn-del-m" onclick="confirmAction()">삭제</button>

<script>
// ── 탭 전환 ──────────────────────────────────────
// ── 탭 전환 (슬라이더) ──────────────────────────
let _curTab = 0;
function switchTab(i){
  _curTab = i;
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('on',i===j));
  const slider = document.getElementById('tab-slider');
  slider.style.transition = 'transform 0.32s cubic-bezier(0.4,0,0.2,1)';
  slider.style.transform = `translateX(${-i*100}%)`;
  if(i===3) setTimeout(renderHistory, 50);
}

// ── 페이지 이동 ──────────────────────────────────
function go(page){
  const map={
    garlic:'./garlic.html', onion:'./onion.html', bean:'./bean.html',
    sweetpotato:'./sweetpotato.html', red_bean:'./red_bean.html',
    apple:'./apple.html', apple_multi:'./apple_multi.html',
    fruit:'./fruit.html', rice:'./rice.html',
    wheat_barley_oat:'./wheat_barley_oat.html'
  };
  if(map[page]) location.href=map[page];
}

// ── 저장목록 ──────────────────────────────────────
let currentFilter='all';
const CROP_ICONS={
  '마늘':'🧄','양파':'🧅','콩':'🫘','고구마':'🍠','팥':'🫘',
  '벼':'🌾','밀':'🌾','보리':'🌾','귀리':'🥣',
  '착과수':'🍎',
  '사과':'🍎','배':'🍐','단감':'🟠','떫은감':'🟤',
  '포도':'🍇','복숭아':'🍑','자두':'🫐'
};
function getIcon(crop){
  for(const k of Object.keys(CROP_ICONS)){ if(crop&&crop.includes(k)) return CROP_ICONS[k]; }
  return '📋';
}
function todayStr(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtShortDate(iso){
  const d=new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()}`;
}
function fmtTime(iso){
  const d=new Date(iso);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function makeLblRow(r){
  const crop = r.cropDetail||r.crop||'-';
  const farm = r.farmNo||'';
  const date = r.savedAt ? fmtShortDate(r.savedAt) : '';
  let html = `<span class="lbl-crop">${crop}</span>`;
  if(farm) html += `<span class="lbl-sep">·</span><span class="lbl-farm">${farm}</span>`;
  if(date) html += `<span class="lbl-sep">·</span><span class="lbl-date">${date}</span>`;
  return `<div class="lbl-row">${html}</div>`;
}
function fmtDateLabel(iso){
  const d=new Date(iso);
  const today=new Date(); today.setHours(0,0,0,0);
  const yest=new Date(today); yest.setDate(yest.getDate()-1);
  const tgt=new Date(d); tgt.setHours(0,0,0,0);
  const days=['일','월','화','수','목','금','토'];
  if(+tgt===+today) return '오늘';
  if(+tgt===+yest)  return '어제';
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} (${days[d.getDay()]})`;
}
function loadHistory(){
  try{ return JSON.parse(localStorage.getItem('save_history')||'[]'); }catch(_){ return []; }
}
function loadImgCache(){
  try{ return JSON.parse(localStorage.getItem('save_img_cache')||'[]'); }catch(_){ return []; }
}
function setFilter(f){
  currentFilter=f;
  document.getElementById('filter-all').classList.toggle('on',f==='all');
  document.getElementById('filter-today').classList.toggle('on',f==='today');
  renderHistory();
}

function renderHistory(){
  const all=loadHistory();
  const imgCache=loadImgCache();
  const imgMap={};
  imgCache.forEach(c=>{ imgMap[String(c.id)]=c.img; });
  const tStr=todayStr();
  const list=currentFilter==='today' ? all.filter(r=>r.savedAt&&r.savedAt.startsWith(tStr)) : all;
  const container=document.getElementById('hist-list');
  if(!list.length){
    container.innerHTML=`<div class="hist-empty"><div class="hist-empty-icon">📂</div>${currentFilter==='today'?'오늘 저장된 내역이 없어요':'저장된 내역이 없어요'}<br><span style="font-size:12px">계산 후 📷 갤러리 저장 버튼을 누르면<br>여기에 기록돼요</span></div>`;
    return;
  }
  // 날짜별 그룹화
  const groups={};
  list.forEach(r=>{
    const key=(r.savedAt||'').substring(0,10)||'날짜없음';
    if(!groups[key]) groups[key]=[];
    groups[key].push(r);
  });
  let html='';
  Object.keys(groups).sort((a,b)=>b.localeCompare(a)).forEach(dk=>{
    const items=groups[dk];
    const lbl=items[0].savedAt ? fmtDateLabel(items[0].savedAt) : dk;
    html+=`<div class="hist-date-group"><div class="hist-date-label">📅 ${lbl} <span class="cnt">${items.length}건</span></div>`;
    items.forEach(r=>{
      const icon=getIcon(r.crop||'');
      const cat=r.category||'밭작물';
      const imgData=imgMap[String(r.id)]||'';

      // 모든 항목: 텍스트 행, 이미지 있으면 클릭 시 팝업
      const hasImg = !!imgData;
      const clickAttr = hasImg ? `onclick="openImgModal('${r.id}')" style="cursor:pointer"` : '';
      const imgHint = hasImg ? `<div style="width:22px;height:22px;border-radius:5px;background:#EBF4FF;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0">🖼</div>` : `<div style="width:22px"></div>`;
      html+=`<div class="hist-item" ${clickAttr}>
        <div class="hist-item-icon cat-${cat}">${icon}</div>
        <div class="hist-item-body">
          ${makeLblRow(r)}
        </div>
        ${imgHint}
        <div class="hist-item-pct ${(()=>{const v=parseFloat(r.pct);return isNaN(v)?'hist-pct-none':v<0?'hist-pct-neg':'hist-pct-pos';})()}">${r.pct||'-'}</div>
        <button class="hist-item-del" onclick="event.stopPropagation();confirmDeleteItem(${r.id})">✕</button>
      </div>`;
    });
    html+='</div>';
  });
  container.innerHTML=html;
}

// ── 이미지 전체보기 (핀치줌 + 드래그 + 더블탭 초기화) ──
let _iz = { scale:1, tx:0, ty:0, lastTap:0 };
let _drag = { on:false, sx:0, sy:0, stx:0, sty:0 };
let _pinch = { on:false, startDist:0, startScale:1, cx:0, cy:0, stx:0, sty:0 };

function _applyTransform(){
  const img = document.getElementById('img-modal-src');
  img.style.transform = `translate(${_iz.tx}px,${_iz.ty}px) scale(${_iz.scale})`;
}
function _resetZoom(){
  _iz.scale=1; _iz.tx=0; _iz.ty=0;
  _applyTransform();
}
function _dist(t){ return Math.hypot(t[0].clientX-t[1].clientX, t[0].clientY-t[1].clientY); }
function _mid(t){ return {x:(t[0].clientX+t[1].clientX)/2, y:(t[0].clientY+t[1].clientY)/2}; }

function _initZoomEvents(){
  const modal = document.getElementById('img-modal');
  const img   = document.getElementById('img-modal-src');

  // 더블탭 초기화
  modal.addEventListener('touchend', e=>{
    if(e.touches.length > 0) return;
    const now = Date.now();
    if(now - _iz.lastTap < 280){ _resetZoom(); }
    _iz.lastTap = now;
  }, {passive:true});

  // 단일 드래그
  modal.addEventListener('touchstart', e=>{
    if(e.touches.length === 1 && _iz.scale > 1){
      _drag.on=true;
      _drag.sx=e.touches[0].clientX; _drag.sy=e.touches[0].clientY;
      _drag.stx=_iz.tx; _drag.sty=_iz.ty;
    }
    if(e.touches.length === 2){
      _drag.on=false;
      _pinch.on=true;
      _pinch.startDist=_dist(e.touches);
      _pinch.startScale=_iz.scale;
      const m=_mid(e.touches);
      _pinch.cx=m.x; _pinch.cy=m.y;
      _pinch.stx=_iz.tx; _pinch.sty=_iz.ty;
    }
  },{passive:true});

  modal.addEventListener('touchmove', e=>{
    e.preventDefault();
    if(_drag.on && e.touches.length===1){
      _iz.tx = _drag.stx + (e.touches[0].clientX - _drag.sx);
      _iz.ty = _drag.sty + (e.touches[0].clientY - _drag.sy);
      _applyTransform();
    }
    if(_pinch.on && e.touches.length===2){
      const d = _dist(e.touches);
      let ns = _pinch.startScale * (d / _pinch.startDist);
      ns = Math.min(Math.max(ns, 0.5), 6);
      _iz.scale = ns;
      _applyTransform();
    }
  },{passive:false});

  modal.addEventListener('touchend', e=>{
    if(e.touches.length < 2){ _pinch.on=false; }
    if(e.touches.length === 0){ _drag.on=false; }
    // 축소하면 위치도 초기화
    if(_iz.scale <= 1){ _iz.scale=1; _iz.tx=0; _iz.ty=0; _applyTransform(); }
  },{passive:true});

  // 배경 탭으로 닫기 (이미지 자체 탭 제외)
  modal.addEventListener('click', e=>{
    if(e.target === modal) closeImgModal();
  });
}

function openImgModal(id){
  const cache=loadImgCache();
  const found=cache.find(c=>String(c.id)===String(id));
  if(!found||!found.img) return;
  _resetZoom();
  document.getElementById('img-modal-src').src=found.img;
  document.getElementById('img-modal').classList.add('show');
  document.body.style.overflow='hidden';
}
function closeImgModal(){
  document.getElementById('img-modal').classList.remove('show');
  document.getElementById('img-modal-src').src='';
  document.body.style.overflow='';
  _resetZoom();
}
// 이벤트 초기화 (DOM 준비 후)
document.addEventListener('DOMContentLoaded', _initZoomEvents);

// ── 삭제 확인 모달 ───────────────────────────────
let _pendingAction=null;
function confirmDeleteItem(id){
  _pendingAction=()=>{
    // 텍스트 기록 삭제
    localStorage.setItem('save_history', JSON.stringify(loadHistory().filter(r=>r.id!==id)));
    // 이미지 캐시도 삭제
    localStorage.setItem('save_img_cache', JSON.stringify(loadImgCache().filter(c=>String(c.id)!==String(id))));
    renderHistory();
  };
  document.getElementById('confirm-msg').innerHTML='이 항목을 삭제할까요?';
  document.getElementById('confirm-modal').classList.add('show');
}
function confirmClearAll(){
  const cnt=loadHistory().length;
  if(!cnt){ alert('삭제할 내역이 없어요.'); return; }
  _pendingAction=()=>{
    localStorage.removeItem('save_history');
    localStorage.removeItem('save_img_cache');
    renderHistory();
  };
  document.getElementById('confirm-msg').innerHTML=`저장된 <strong>${cnt}건</strong>을 모두 삭제할까요?<br><span style="font-size:12px;color:#aaa">복구할 수 없어요</span>`;
  document.getElementById('confirm-modal').classList.add('show');
}
function confirmAction(){ if(_pendingAction)_pendingAction(); _pendingAction=null; closeConfirm(); }
function closeConfirm(){ document.getElementById('confirm-modal').classList.remove('show'); _pendingAction=null; }

// ── 스와이프 (실시간 드래그 + 부드러운 릴리즈) ──
(function(){
  let _sx=0, _sy=0, _dragging=false, _vertLocked=false;
  const TABS=4;
  const getSlider = ()=>document.getElementById('tab-slider');

  function inScrollArea(el){
    return el.closest('#hist-list')||el.closest('.confirm-box')||el.closest('#img-zoom-wrap');
  }

  document.addEventListener('touchstart', e=>{
    if(document.getElementById('img-modal').classList.contains('show')) return;
    if(inScrollArea(e.target)) return;
    _sx=e.touches[0].clientX;
    _sy=e.touches[0].clientY;
    _dragging=false; _vertLocked=false;
    getSlider().style.transition='none';
  },{passive:true});

  document.addEventListener('touchmove', e=>{
    if(document.getElementById('img-modal').classList.contains('show')) return;
    if(inScrollArea(e.target)) return;
    const dx=e.touches[0].clientX-_sx;
    const dy=e.touches[0].clientY-_sy;
    if(!_dragging && !_vertLocked){
      if(Math.abs(dy)>Math.abs(dx)+5){ _vertLocked=true; return; }
      if(Math.abs(dx)>8) _dragging=true;
    }
    if(!_dragging||_vertLocked) return;
    const base=-_curTab*100;
    let pct=(dx/window.innerWidth)*100;
    if(_curTab===0 && dx>0)       pct*=0.2;
    if(_curTab===TABS-1 && dx<0)  pct*=0.2;
    getSlider().style.transform=`translateX(${base+pct}%)`;
  },{passive:true});

  document.addEventListener('touchend', e=>{
    if(!_dragging||_vertLocked){ _dragging=false; return; }
    const dx=e.changedTouches[0].clientX-_sx;
    if(dx<-50 && _curTab<TABS-1)     switchTab(_curTab+1);
    else if(dx>50 && _curTab>0)      switchTab(_curTab-1);
    else                              switchTab(_curTab);
    _dragging=false;
  },{passive:true});
})();
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(regs=>regs.forEach(r=>r.unregister()));
  caches.keys().then(keys=>Promise.all(keys.map(k=>caches.delete(k))));
}
</script>
