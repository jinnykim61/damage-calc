<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="theme-color" content="#185FA5">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>과수 다품종 착과수 계산기</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
function bindMobileFocusHandlers(){
  document.querySelectorAll('input.inp, select.inp, input.sg-inp').forEach(el=>{
    if(el.dataset.mobileFocusBound==='1') return;
    el.dataset.mobileFocusBound='1';
    el.addEventListener('focus',()=>el.classList.add('mobile-focus'),{passive:true});
    el.addEventListener('blur',()=>el.classList.remove('mobile-focus'),{passive:true});
    el.addEventListener('touchend',(e)=>{
      if(e.cancelable) e.preventDefault();
      el.focus(); el.classList.add('mobile-focus');
    },{passive:false});
  });
}
document.addEventListener('DOMContentLoaded',()=>{
  bindMobileFocusHandlers();
  document.addEventListener('click',()=>setTimeout(bindMobileFocusHandlers,0),{passive:true});
});
</script>
<style>
:root{
  --blue:#185FA5;--blue2:#378ADD;
  --auto:#F3F1EA;--border:#D8D6CE;--binp:#378ADD;
  --text:#1a1a1a;--sub:#666;--hint:#aaa;
  --bg:#F5F4F0;--card:#fff;
  --red:#e24b4a;--green:#1D9E75;--orange:#E8860A;
  --r:12px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:14px}

/* 헤더 */
.header{background:var(--blue);color:white;padding:14px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:10px}
.back-btn{width:32px;height:32px;background:rgba(255,255,255,0.15);border:none;border-radius:8px;color:white;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1}
.header-icon{width:28px;height:28px;background:rgba(255,255,255,0.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.header h1{font-size:15px;font-weight:600}
.header-sub{font-size:11px;opacity:0.75;margin-top:1px}

/* 범례 */
.legend{display:flex;gap:12px;padding:8px 16px;background:var(--card);border-bottom:0.5px solid var(--border)}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--sub)}
.dot-inp{width:10px;height:10px;border-radius:2px;background:white;border:1.5px solid var(--binp)}
.dot-filled{width:10px;height:10px;border-radius:2px;background:#e8faf3;border:1.5px solid var(--green)}
.dot-auto{width:10px;height:10px;border-radius:2px;background:var(--auto);border:0.5px solid var(--border)}

/* 품목 선택 탭 */
.crop-tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);padding:0 12px;gap:4px}
.crop-tab{flex:1;padding:10px 4px;text-align:center;font-size:13px;font-weight:600;color:var(--hint);border-bottom:2.5px solid transparent;cursor:pointer;opacity:0.45;transition:opacity 0.15s}
.crop-tab.on{color:var(--blue);border-bottom-color:var(--blue);opacity:1}

/* 컨텐츠 */
.content{padding:12px 12px 40px}
.section{background:var(--card);border-radius:var(--r);padding:14px;margin-bottom:10px;border:0.5px solid var(--border)}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-title{font-size:12px;font-weight:600;color:var(--sub);letter-spacing:0.04em}
.reset-btn{height:32px;padding:0 12px;background:transparent;border:1.5px solid var(--red);border-radius:var(--rs);color:var(--red);font-size:12px;font-weight:600;cursor:pointer}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.field{display:flex;flex-direction:column;gap:3px}
.field label{font-size:11px;color:var(--sub);font-weight:500}
.field label.sm{font-size:9px}

input.inp,select.inp{height:40px;border:1.5px solid var(--binp);border-radius:var(--rs);padding:0 8px;font-size:14px;background:white;color:var(--text);width:100%;-webkit-appearance:none;transition:background 0.15s,border-color 0.15s;text-align:center}
input.inp::placeholder{color:var(--hint);text-align:center}
input.inp.filled{background:#e8faf3;border-color:var(--green);color:#0d5c35}
select.inp.filled{background:#e8faf3;border-color:var(--green);color:#0d5c35}
input.auto{height:40px;border:0.5px solid var(--border);border-radius:var(--rs);padding:0 8px;font-size:14px;background:var(--auto);color:var(--sub);width:100%;-webkit-appearance:none;text-align:center}
input.auto.warn{background:#FFF3CD;color:#856404;border-color:#ffc107}
input.auto.ok{background:#e8faf3;color:var(--green);border-color:var(--green)}
/* mobile focus */
input.inp.mobile-focus,select.inp.mobile-focus,input.sg-inp.mobile-focus,
input.inp:focus,input.inp:focus-visible,input.inp:active,
select.inp:focus,select.inp:focus-visible,select.inp:active,
input.sg-inp:focus,input.sg-inp:focus-visible,input.sg-inp:active{
  outline:none !important;border-color:#185FA5 !important;
  box-shadow:0 0 0 3px rgba(55,138,221,0.22) !important;
  background:#DCEEFF !important;color:#185FA5 !important;
}
input.inp.filled.mobile-focus,select.inp.filled.mobile-focus,
input.inp.filled:focus,input.inp.filled:focus-visible,input.inp.filled:active,
select.inp.filled:focus,select.inp.filled:focus-visible,select.inp.filled:active{
  outline:none !important;border-color:#185FA5 !important;
  box-shadow:0 0 0 3px rgba(55,138,221,0.22) !important;
  background:#DCEEFF !important;color:#185FA5 !important;
}

/* 기본정보 요약바 */
.info-summary{background:var(--blue);padding:10px 14px;display:grid;grid-template-columns:repeat(4,1fr);gap:6px;border-radius:var(--r) var(--r) 0 0}
.sum-item{display:flex;flex-direction:column;align-items:center;gap:2px}
.sum-lbl{font-size:9px;color:rgba(255,255,255,0.7);font-weight:500;text-align:center}
.sum-val{font-size:16px;font-weight:700;color:#fff;line-height:1}
.sum-val.warn{color:#FFE082}
.sum-unit{font-size:9px;color:rgba(255,255,255,0.6);margin-left:1px}
/* 접기/펼치기 */
.collapse-head{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;cursor:pointer;border-top:0.5px solid var(--border);background:var(--card)}
.collapse-lbl{font-size:11px;color:var(--sub);font-weight:600}
.collapse-toggle{font-size:11px;color:var(--blue);font-weight:600;display:flex;align-items:center;gap:4px}
.collapse-icon{font-size:10px;color:var(--hint);transition:transform 0.2s;display:inline-block}
.collapse-icon.open{transform:rotate(180deg)}
.collapse-body{overflow:hidden;transition:max-height 0.25s ease;max-height:0}
.collapse-body.open{max-height:600px}
.variety-card{background:var(--bg);border-radius:var(--rs);padding:12px;margin-bottom:10px;border:0.5px solid var(--border);overflow:hidden}
.variety-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.variety-num{width:24px;height:24px;background:var(--blue);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.variety-name{flex:1;margin:0 8px}
.variety-name input{height:36px;border:1.5px solid var(--binp);border-radius:var(--rs);padding:0 8px;font-size:13px;background:white;color:var(--text);width:100%;-webkit-appearance:none}
.del-variety-btn{height:32px;width:32px;border:none;background:transparent;color:var(--red);cursor:pointer;font-size:18px;border-radius:6px;flex-shrink:0}

.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px}

/* 표본주 테이블 */
.sample-toggle{font-size:12px;color:var(--blue);cursor:pointer;font-weight:600;padding:6px 0;display:flex;align-items:center;gap:4px}
.sample-section{display:none}
.sample-section.open{display:block}
.sample-grid{display:grid;gap:6px;margin-top:8px}
.sample-row{display:grid;grid-template-columns:28px 1fr;gap:6px;align-items:center}
.sample-row .no{font-size:11px;color:var(--hint);text-align:center}
.sample-row input{height:34px;border:1.5px solid var(--binp);border-radius:6px;padding:0 8px;font-size:13px;background:white;color:var(--text);text-align:center;width:100%;-webkit-appearance:none;transition:background 0.2s,border-color 0.2s}
.sample-row input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(55,138,221,0.15)}
.sample-row input.filled{background:#e8faf3;border-color:var(--green);color:#0d5c35}
.sample-row input.filled:focus{box-shadow:0 0 0 3px rgba(29,158,117,0.15)}

.add-variety-btn{width:100%;height:38px;border:1.5px dashed var(--blue2);background:#EBF4FF;border-radius:var(--rs);font-size:13px;font-weight:600;color:var(--blue);cursor:pointer}
.add-variety-btn:active{background:var(--auto)}

/* 계산 버튼 */
.calc-btn{width:100%;height:52px;background:var(--blue);color:white;border:none;border-radius:var(--r);font-size:17px;font-weight:700;cursor:pointer;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px}
.calc-btn:active{background:#0d4a8a}
.calc-btn.done{background:var(--green)}

/* 결과 */
.result-box{display:none;background:var(--blue);border-radius:var(--r);padding:0 16px;margin-bottom:6px;color:white;border:1.5px solid rgba(255,255,255,0.2)}
.result-box.show{display:block}
.result-box.pending{background:#888;border:1.5px solid rgba(255,255,255,0.15)}
.result-detail-box{display:none;background:var(--card);border-radius:var(--r);margin-bottom:10px;border:0.5px solid var(--border);overflow:hidden}
.result-detail-box.show{display:block}
.save-btn{background:rgba(255,255,255,0.2);border:1.5px solid rgba(255,255,255,0.4);color:white;border-radius:12px;height:36px;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:0 14px;white-space:nowrap;flex-shrink:0}
.save-btn:active{background:rgba(255,255,255,0.35)}

/* 표본주 그리드 */
.sg-wrap{display:grid;gap:6px;width:100%;overflow:hidden}
.sg-col{display:flex;flex-direction:column;gap:6px;min-width:0;overflow:hidden}
.sg-cell{display:flex;flex-direction:row;align-items:center;gap:4px}
.sg-no{font-size:13px;font-weight:700;color:var(--sub);min-width:18px;text-align:right;flex-shrink:0}
.sg-inp{flex:1;height:40px;border:1.5px solid var(--binp);border-radius:6px;font-size:15px;font-weight:600;background:white;color:var(--text);text-align:center;-webkit-appearance:none;box-sizing:border-box;min-width:0;transition:background 0.15s,border-color 0.15s}
.sg-inp.filled{background:#e8faf3;border-color:var(--green);color:#0d5c35}

/* 팝업 */
#save-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;align-items:center;justify-content:center}
#save-overlay.show{display:flex}
.save-modal{background:white;border-radius:var(--r);padding:24px 20px;text-align:center;width:260px}
.save-modal p{font-size:14px;margin-bottom:16px;color:var(--sub)}
.save-modal .btn-ok{width:100%;height:42px;background:var(--blue);color:white;border:none;border-radius:var(--rs);font-size:14px;font-weight:600;cursor:pointer}
</style>
</head>
<body>

<div class="header">
  <button class="back-btn" onclick="location.href='./index.html'">‹</button>
  <div class="header-icon">🍎</div>
  <div>
    <h1>과수4종 착과수 계산기</h1>
    <div class="header-sub">사과 · 배 · 단감 · 떫은감</div>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><div class="dot-inp"></div>직접 입력</div>
  <div class="legend-item"><div class="dot-filled"></div>입력 완료</div>
  <div class="legend-item"><div class="dot-auto"></div>자동 계산</div>
</div>

<!-- 품목 선택 탭 -->
<div class="crop-tabs">
  <div class="crop-tab on" onclick="setCrop('apple',0)">🍎 사과</div>
  <div class="crop-tab" onclick="setCrop('pear',1)">🍐 배</div>
  <div class="crop-tab" onclick="setCrop('sweetpersimmon',2)">🟠 단감</div>
  <div class="crop-tab" onclick="setCrop('persimmon',3)">🟤 떫은감</div>
</div>
<div style="background:var(--card);border-bottom:0.5px solid var(--border);padding:6px 12px;display:flex;justify-content:flex-end">
  <button onclick="openResetModal()" style="height:28px;padding:0 14px;background:#FFF5F5;border:1.5px solid var(--red);border-radius:var(--rs);font-size:12px;font-weight:600;color:var(--red);cursor:pointer">전체 초기화</button>
</div>

<div class="content">

  <!-- 기본 정보 -->
  <div class="section" style="padding:0;overflow:hidden">
    <!-- 항상 보이는 요약 바 -->
    <div class="info-summary">
      <div class="sum-item">
        <div class="sum-lbl">가입주수</div>
        <div style="display:flex;align-items:baseline;gap:1px">
          <span class="sum-val" id="sv-reg">-</span>
          <span class="sum-unit">주</span>
        </div>
      </div>
      <div class="sum-item">
        <div class="sum-lbl">조사대상</div>
        <div style="display:flex;align-items:baseline;gap:1px">
          <span class="sum-val" id="sv-survey">-</span>
          <span class="sum-unit">주</span>
        </div>
      </div>
      <div class="sum-item">
        <div class="sum-lbl">표본주수</div>
        <div style="display:flex;align-items:baseline;gap:1px">
          <span class="sum-val" id="sv-sample">-</span>
          <span class="sum-unit">주</span>
        </div>
      </div>
      <div class="sum-item">
        <div class="sum-lbl">적정표본</div>
        <div style="display:flex;align-items:baseline;gap:1px">
          <span class="sum-val" id="sv-proper">-</span>
          <span class="sum-unit">주</span>
        </div>
      </div>
    </div>

    <!-- 평년착과수 입력 -->
    <div style="padding:10px 14px;background:var(--card);border-top:0.5px solid var(--border)">
      <div class="field" style="max-width:33%">
        <label>평년착과수</label>
        <input type="text" id="avg_fruit" class="inp" inputmode="decimal" placeholder="0"
          oninput="onCommaInput(this);onInput()">
      </div>
    </div>

    <!-- 접기/펼치기 헤더 -->
    <div class="collapse-head" onclick="toggleBasicInfo()">
      <span class="collapse-lbl">① 기본정보 상세</span>
      <div class="collapse-toggle">
        <span id="info-toggle-lbl">상세보기</span>
        <span class="collapse-icon" id="info-toggle-icon">▼</span>
      </div>
    </div>

    <!-- 접히는 상세 내용 -->
    <div class="collapse-body" id="basic-info-body">
      <div style="padding:12px 14px 14px">
        <!-- 1열: 고사주수 / 수확불능주수 / 미보상고사 / 미보상미고사 -->
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px">
          <div class="field">
            <label>고사주수</label>
            <input type="text" id="total_dead" class="auto" readonly>
          </div>
          <div class="field">
            <label>수확불능주수</label>
            <input type="text" id="total_unable" class="auto" readonly>
          </div>
          <div class="field">
            <label>미보상고사</label>
            <input type="text" id="total_uninsDead" class="auto" readonly>
          </div>
          <div class="field">
            <label>미보상미고사</label>
            <input type="text" id="total_uninsAlive" class="auto" readonly>
          </div>
        </div>
        <!-- 2열: 표본착과수합 / 1주당착과수 / 착과수 / 계약변경여부 -->
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px">
          <div class="field">
            <label class="sm">표본착과수합</label>
            <input type="text" id="total_sampleSum" class="auto" readonly>
          </div>
          <div class="field">
            <label class="sm">1주당착과수</label>
            <input type="text" id="total_perTree" class="auto" readonly>
          </div>
          <div class="field">
            <label class="sm">착과수</label>
            <input type="text" id="total_afterFruit" class="auto ok" readonly>
          </div>
          <div class="field">
            <label class="sm">계약변경여부</label>
            <input type="text" id="contract_yn" class="auto" readonly>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- hidden: JS 계산용 (요약바로 이동된 항목) -->
  <div style="display:none">
    <input type="text" id="total_trees">
    <input type="text" id="total_actual">
    <input type="text" id="total_survey_disp">
    <input type="text" id="total_sampleN">
    <input type="text" id="proper_sample">
  </div>
  <div class="section">
    <div class="sec-head">
      <div class="sec-title">② 품종별 조사 <span id="variety-count-badge" style="font-size:11px;font-weight:400;color:var(--blue)"></span></div>
    </div>
    <div id="variety-list"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px">
      <button class="add-variety-btn" onclick="addVariety()">+ 품종 추가</button>
      <button onclick="delVariety(varieties.length-1)"
        style="width:100%;height:38px;border:1.5px solid var(--red);background:transparent;border-radius:var(--rs);font-size:13px;font-weight:600;color:var(--red);cursor:pointer">− 품종 삭제</button>
    </div>
  </div>

  <!-- 계산 버튼 -->
  <button class="calc-btn" id="calc-btn" onclick="doCalc()">
    <span>🧮</span><span>착과수 계산</span>
  </button>

  <!-- 결과 메인 박스 (마늘 스타일) -->
  <div class="result-box" id="result-section">
    <div style="display:flex;align-items:center;padding:14px 0">
      <div style="padding-right:12px;flex-shrink:0">
        <span style="font-size:13px;color:rgba(255,255,255,0.7);font-weight:500;letter-spacing:0.04em">착과율</span>
      </div>
      <div style="width:1px;height:34px;background:rgba(255,255,255,0.28);flex-shrink:0"></div>
      <div style="padding:0 12px;flex:1;min-width:0">
        <span id="result-rate" style="font-size:26px;font-weight:700;color:#FFD0D0;letter-spacing:-0.02em;line-height:1;white-space:nowrap">- -</span>
      </div>
      <div style="width:1px;height:34px;background:rgba(255,255,255,0.28);flex-shrink:0"></div>
      <div style="padding-left:12px;flex-shrink:0">
        <button class="save-btn" onclick="saveImage()"><span style="font-size:14px">📷</span><span>갤러리 저장</span></button>
      </div>
    </div>
  </div>

  <!-- 간이 결과 박스 -->
  <div class="result-detail-box" id="result-detail-section">
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0">
      <div style="padding:10px 8px;text-align:center;border-right:0.5px solid var(--border)">
        <div style="font-size:10px;color:var(--sub);margin-bottom:4px">평년착과수</div>
        <div style="font-size:15px;font-weight:700;color:var(--text)" id="r-avg">-</div>
      </div>
      <div style="padding:10px 8px;text-align:center;border-right:0.5px solid var(--border)">
        <div style="font-size:10px;color:var(--sub);margin-bottom:4px">적과후착과수</div>
        <div style="font-size:15px;font-weight:700;color:var(--blue)" id="r-total">-</div>
      </div>
      <div style="padding:10px 8px;text-align:center">
        <div style="font-size:10px;color:var(--sub);margin-bottom:4px">계약변경여부</div>
        <div style="font-size:13px;font-weight:700" id="r-contract">-</div>
      </div>
    </div>
  </div>

</div>

<div id="save-overlay">
  <div class="save-modal">
    <div style="font-size:36px;margin-bottom:10px">✅</div>
    <p>결과가 갤러리에 저장됐어요!</p>
    <button class="btn-ok" onclick="document.getElementById('save-overlay').classList.remove('show')">확인</button>
  </div>
</div>

  <div style="background:#fff;border-radius:20px;padding:24px 20px;width:100%;max-width:340px;box-shadow:0 18px 40px rgba(0,0,0,0.18)">
    <div style="font-size:18px;font-weight:800;color:#333;text-align:center;margin-bottom:10px">전체 초기화</div>
    <div style="font-size:14px;line-height:1.65;color:#666;text-align:center;margin-bottom:20px">입력한 모든 값을 초기화할까요?<br>초기화 후에는 되돌릴 수 없습니다.</div>
    <div style="display:flex;gap:10px">
      <button onclick="document.getElementById('reset-overlay').style.display='none'" style="flex:1;height:46px;border:1.5px solid #d9d9d9;border-radius:12px;background:#f7f7f7;color:#555;font-size:15px;font-weight:700;cursor:pointer">취소</button>
      <button onclick="document.getElementById('reset-overlay').style.display='none';resetAll()" style="flex:1;height:46px;border:none;border-radius:12px;background:#185FA5;color:#fff;font-size:15px;font-weight:700;cursor:pointer">초기화</button>
    </div>
  </div>
</div>

<div id="variety-reset-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:360;align-items:center;justify-content:center;padding:20px">
  <div style="background:#fff;border-radius:20px;padding:24px 20px;width:100%;max-width:340px;box-shadow:0 18px 40px rgba(0,0,0,0.18)">
    <div style="font-size:22px;text-align:center;margin-bottom:8px">🌿</div>
    <div style="font-size:17px;font-weight:800;color:#333;text-align:center;margin-bottom:8px" id="variety-reset-title">품종 초기화</div>
    <div style="font-size:14px;line-height:1.65;color:#666;text-align:center;margin-bottom:20px" id="variety-reset-desc">입력값을 모두 초기화할까요?<br>초기화 후에는 되돌릴 수 없습니다.</div>
    <div style="display:flex;gap:10px">
      <button onclick="document.getElementById('variety-reset-overlay').style.display='none'" style="flex:1;height:46px;border:1.5px solid #d9d9d9;border-radius:12px;background:#f7f7f7;color:#555;font-size:15px;font-weight:700;cursor:pointer">취소</button>
      <button id="variety-reset-confirm-btn" style="flex:1;height:46px;border:none;border-radius:12px;background:#e24b4a;color:#fff;font-size:15px;font-weight:700;cursor:pointer">초기화</button>
    </div>
  </div>
</div>


<div id="toast-msg" style="display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(30,30,30,0.88);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:400;white-space:nowrap;pointer-events:none"></div>

<script>
function toggleBasicInfo(){
  const body = document.getElementById('basic-info-body');
  const icon = document.getElementById('info-toggle-icon');
  const lbl = document.getElementById('info-toggle-lbl');
  const isOpen = body.classList.toggle('open');
  icon.classList.toggle('open', isOpen);
  lbl.textContent = isOpen ? '접기' : '상세보기';
}

function updateSummaryBar(totalReg, totalSurvey, totalSampleN, properSample){
  const set = (id, val, unit) => {
    const el = document.getElementById(id);
    if(!el) return;
    el.textContent = val > 0 ? val.toLocaleString() : '-';
  };
  const sEl = document.getElementById('sv-reg');
  const svEl = document.getElementById('sv-survey');
  const snEl = document.getElementById('sv-sample');
  const spEl = document.getElementById('sv-proper');
  if(sEl) sEl.textContent = totalReg > 0 ? totalReg.toLocaleString() : '-';
  if(svEl) svEl.textContent = totalSurvey > 0 ? totalSurvey.toLocaleString() : '-';
  if(snEl){
    snEl.textContent = totalSampleN > 0 ? totalSampleN : '-';
    snEl.className = 'sum-val' + (totalSampleN > 0 && properSample > 0 && totalSampleN < properSample ? ' warn' : '');
  }
  if(spEl) spEl.textContent = properSample > 0 ? properSample : '-';
}
function showToast(msg, duration=2200){
  const t=document.getElementById('toast-msg');
  t.textContent=msg; t.style.display='block';
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.style.display='none', duration);
}
function openResetModal(){ document.getElementById('reset-overlay').style.display='flex'; }
// 천단위 구분 입력
function toNum(el){ return parseFloat((el.value||'').replace(/,/g,''))||0; }
function onCommaInput(el){
  const raw = el.value.replace(/,/g,'').replace(/[^0-9.]/g,'');
  const parts = raw.split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g,',');
  el.value = parts.join('.');
  el.classList.toggle('filled', el.value !== '' && el.value !== '0');
}

// ── 상수 ──────────────────────────────────────────
// 표본주수 기준표 (조사대상주 합계 기준)
const SAMPLE_TABLE = [
  [1,49,5],[50,99,6],[100,149,7],[150,199,8],
  [200,299,9],[300,399,10],[400,499,11],[500,599,12],
  [600,699,13],[700,799,14],[800,899,15],[900,999,16],[1000,1e9,17]
];

const CROP_NAMES = {apple:'사과', pear:'배', sweetpersimmon:'단감', persimmon:'떫은감'};
let currentCrop = 'apple';

const EMPTY_VARIETY = () => ({name:'', age:0, reg:0, actual:0, dead:0, unable:0, uninsDead:0, uninsAlive:0, samples:[], open:false, treeOpen:false});

// ── 작물별 독립 데이터 ────────────────────────────
const allData = {
  apple:          { avgFruit:'', varieties:[EMPTY_VARIETY()] },
  pear:           { avgFruit:'', varieties:[EMPTY_VARIETY()] },
  sweetpersimmon: { avgFruit:'', varieties:[EMPTY_VARIETY()] },
  persimmon:      { avgFruit:'', varieties:[EMPTY_VARIETY()] },
};

// 현재 작물 데이터 참조
let varieties = allData[currentCrop].varieties;

// ── 조사대상주 계산 ─────────────────────────────
function getSurveyTarget(v){
  return Math.max(0, (v.actual||0) - (v.dead||0) - (v.unable||0) - (v.uninsDead||0) - (v.uninsAlive||0));
}

// ── 즉시 자동계산칸 업데이트 (리렌더 없이) ────────
function quickUpdate(vi, field, val){
  const tmp = {...varieties[vi], [field]: +val||0};
  const totalSurvey = varieties.reduce((s,vv,i) => {
    const sv = i===vi ? getSurveyTarget(tmp) : getSurveyTarget(vv);
    return s+sv;
  }, 0);
  const totalProper = getProperSample(totalSurvey);
  const surveyTarget = getSurveyTarget(tmp);
  const properN = surveyTarget > 0 && totalSurvey > 0
    ? Math.max(1, Math.ceil(totalProper * surveyTarget / totalSurvey)) : 0;

  const sEl = document.getElementById(`vi-survey-${vi}`);
  const pEl = document.getElementById(`vi-proper-${vi}`);
  const pnEl = document.getElementById(`vi-proper-num-${vi}`);
  const ivEl = document.getElementById(`vi-interval-${vi}`);
  if(sEl) sEl.value = surveyTarget > 0 ? surveyTarget.toLocaleString()+'주' : '';
  if(pEl) pEl.value = properN > 0 ? properN+'주' : '';
  if(pnEl) pnEl.textContent = properN > 0 ? properN : 0;
  if(ivEl) ivEl.textContent = (surveyTarget>0&&properN>0) ? Math.round(surveyTarget/properN) : 0;
  // 기본정보 합계만 업데이트 (리렌더 없이)
  updateSummaryOnly();
}

function updateSummaryOnly() {
  const totalReg = varieties.reduce((s,v) => s+(v.reg||0), 0);
  const totalActual = varieties.reduce((s,v) => s+(v.actual||0), 0);
  const totalSurvey = varieties.reduce((s,v) => s+getSurveyTarget(v), 0);
  const properSample = getProperSample(totalSurvey);
  const totalDead = varieties.reduce((s,v) => s+(v.dead||0), 0);
  const totalUnable = varieties.reduce((s,v) => s+(v.unable||0), 0);
  const totalUninsDead = varieties.reduce((s,v) => s+(v.uninsDead||0), 0);
  const totalUninsAlive = varieties.reduce((s,v) => s+(v.uninsAlive||0), 0);
  const totalSampleN = varieties.reduce((s,v) => s+v.samples.filter(x=>x!==''&&!isNaN(parseFloat(x))).length, 0);
  const set = (id,val,unit='주') => { const el=document.getElementById(id); if(el) el.value=val>0?val.toLocaleString()+unit:''; };
  set('total_trees', totalReg);
  set('total_actual', totalActual);
  set('total_survey_disp', totalSurvey);
  set('proper_sample', properSample, '주');
  set('total_dead', totalDead);
  set('total_unable', totalUnable);
  set('total_uninsDead', totalUninsDead);
  set('total_uninsAlive', totalUninsAlive);
  set('total_sampleN', totalSampleN, '주');
  const needReview = varieties.some(v => v.reg>0 && v.actual>0 && Math.abs(v.actual-v.reg)/v.reg>0.05);
  const cEl = document.getElementById('contract_yn');
  if(cEl){ cEl.value=totalReg>0?(needReview?'계약변경 대상':'이상무'):''; cEl.className='auto'+(needReview?' warn':(totalReg>0?' ok':'')); }
  updateSummaryBar(totalReg, totalSurvey, totalSampleN, properSample);
}

// ── 표본주수 계산 ─────────────────────────────────
function getProperSample(total) {
  if (!total || total <= 0) return 0;
  for (const [lo,hi,n] of SAMPLE_TABLE) if (total>=lo && total<=hi) return n;
  return 17;
}

// ── 품목 전환 ─────────────────────────────────────
function setCrop(crop, idx) {
  // 현재 작물 avgFruit 저장
  allData[currentCrop].avgFruit = document.getElementById('avg_fruit').value;
  currentCrop = crop;
  varieties = allData[currentCrop].varieties;
  document.querySelectorAll('.crop-tab').forEach((t,i) => t.classList.toggle('on', i===idx));
  // 해당 작물 avgFruit 복원
  const af = document.getElementById('avg_fruit');
  af.value = allData[currentCrop].avgFruit;
  af.classList.toggle('filled', !!af.value);
  document.getElementById('result-section').classList.remove('show');
  document.getElementById('result-detail-section').classList.remove('show');
  onInput();
}

// ── 품종 렌더링 ───────────────────────────────────
function renderVarieties(totalSurvey, totalProper) {
  if (totalSurvey === undefined) {
    totalSurvey = varieties.reduce((s,v) => s + getSurveyTarget(v), 0);
    totalProper = getProperSample(totalSurvey);
  }
  const container = document.getElementById('variety-list');
  const badge = document.getElementById('variety-count-badge');
  badge.textContent = `(${varieties.length}품종)`;

  const surveyTargets = varieties.map(v => getSurveyTarget(v));
  const properNs = surveyTargets.map(st =>
    st > 0 && totalSurvey > 0 ? Math.max(1, Math.ceil(totalProper * st / totalSurvey)) : 0
  );

  container.innerHTML = varieties.map((v, vi) => {
    const surveyTarget = surveyTargets[vi];
    const properN = properNs[vi];

    // 샘플 배열 조정 — properN 기준으로 늘리거나, 줄 때는 빈 칸만 제거
    if (properN > v.samples.length) {
      while (v.samples.length < properN) v.samples.push('');
    } else if (properN < v.samples.length) {
      // 뒤에서부터 빈 칸 제거해서 properN에 맞춤
      while (v.samples.length > properN && v.samples[v.samples.length-1] === '') {
        v.samples.pop();
      }
    }

    const inputtedSamples = v.samples.filter(s => s !== '' && !isNaN(parseFloat(s))).length;
    const sampleSum = v.samples.reduce((s,x) => s + (parseFloat(x)||0), 0);
    const perTree = inputtedSamples > 0 ? (sampleSum / inputtedSamples) : 0;
    const afterFruit = perTree > 0 && surveyTarget > 0 ? Math.round(perTree * surveyTarget) : 0;

    // 표본주 그리드 (4열) - properN 기준으로 칸 생성
    const _total = Math.max(v.samples.length, properN);
    let samplesHtml = `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px">`;
    for(let si=0; si<_total; si++){
      const s = v.samples[si] || '';
      const filled = s!=='' && !isNaN(parseFloat(s));
      const isLast = si === _total - 1;
      samplesHtml += `<div style="display:flex;flex-direction:column;align-items:center;gap:2px">
        <span style="font-size:10px;font-weight:700;color:var(--hint)">${si+1}</span>
        <input type="number" value="${s}" inputmode="decimal" placeholder=""
          enterkeyhint="${isLast?'done':'next'}"
          style="width:100%;height:38px;border:1.5px solid ${filled?'#1D9E75':'#378ADD'};border-radius:6px;font-size:14px;font-weight:600;background:${filled?'#e8faf3':'white'};color:${filled?'#0d5c35':'#1a1a1a'};text-align:center;-webkit-appearance:none;box-sizing:border-box"
          oninput="varieties[${vi}].samples[${si}]=this.value;this.style.background=this.value?'#e8faf3':'white';this.style.borderColor=this.value?'#1D9E75':'#378ADD';this.style.color=this.value?'#0d5c35':'#1a1a1a';calcVariety(${vi})"
          onfocus="this.style.background='#dceeff';this.style.borderColor='#185FA5';this.style.color='#185FA5';const v=this.value;this.value='';this.value=v;"
          onblur="varieties[${vi}].samples[${si}]=this.value;this.style.background=this.value?'#e8faf3':'white';this.style.borderColor=this.value?'#1D9E75':'#378ADD';this.style.color=this.value?'#0d5c35':'#1a1a1a';saveState()"
          onkeydown="if(event.key==='Enter'){event.preventDefault();${isLast?`varieties[${vi}].samples[${si}]=this.value;calcVariety(${vi});this.blur();`:`const inputs=document.querySelectorAll('#ss-${vi} input');const idx=Array.from(inputs).indexOf(this);if(inputs[idx+1])inputs[idx+1].focus();`}}">
      </div>`;
    }
    samplesHtml += '</div>';

    const inp = (field, val, label) => {
      const filled = val > 0;
      return `<div class="field">
        <label>${label}</label>
        <input type="number" class="inp${filled?' filled':''}" value="${val||''}" inputmode="decimal"
          onfocus="this.style.background='#dceeff';this.style.borderColor='#185FA5';this.style.color='#185FA5';const _v=this.value;this.value='';this.value=_v;"
          onblur="varieties[${vi}].${field}=+this.value||0;this.style.background=this.value?'#e8faf3':'white';this.style.borderColor=this.value?'#1D9E75':'#378ADD';this.style.color=this.value?'#0d5c35':'#1a1a1a';quickUpdate(${vi},'${field}',this.value);saveState()"
          oninput="this.classList.toggle('filled',this.value!='');varieties[${vi}].${field}=+this.value||0">
      </div>`;
    };

    const defaultName = `품종${vi+1}`;
    const displayName = v.name || defaultName;

    return `
    <div class="variety-card" id="vc-${vi}">
      <!-- 1열: 번호 / 품종명 / 수령 / 초기화버튼 -->
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <div class="variety-num" style="flex-shrink:0">${vi+1}</div>
        <input type="text" class="inp${v.name?' filled':''}" value="${v.name||''}" placeholder="${defaultName}"
          style="flex:1.5;height:40px;font-size:13px" enterkeyhint="next"
          onfocus="this.style.background='#dceeff';this.style.borderColor='#185FA5';this.style.color='#185FA5';const _v=this.value;this.value='';this.value=_v;"
          onblur="this.style.background=this.value?'#e8faf3':'white';this.style.borderColor=this.value?'#1D9E75':'#378ADD';this.style.color=this.value?'#0d5c35':'#1a1a1a'"
          oninput="varieties[${vi}].name=this.value;saveState()"
          onkeydown="if(event.key==='Enter'){event.preventDefault();document.querySelector('#vc-${vi} input[placeholder=수령]')?.focus()}">
        <input type="number" class="inp${v.age>0?' filled':''}" value="${v.age||''}" inputmode="decimal" placeholder="수령"
          style="flex:0.8;height:40px;font-size:13px" enterkeyhint="next"
          onfocus="this.style.background='#dceeff';this.style.borderColor='#185FA5';this.style.color='#185FA5';const _v=this.value;this.value='';this.value=_v;"
          onblur="this.style.background=this.value?'#e8faf3':'white';this.style.borderColor=this.value?'#1D9E75':'#378ADD';this.style.color=this.value?'#0d5c35':'#1a1a1a'"
          oninput="this.classList.toggle('filled',this.value!='');varieties[${vi}].age=+this.value||0;saveState()"
          onkeydown="if(event.key==='Enter'){event.preventDefault();document.getElementById('vi-reg-${vi}')?.focus()}">
        <button onclick="resetVariety(${vi})"
          style="flex-shrink:0;width:64px;height:40px;padding:0;background:transparent;border:1.5px solid var(--red);border-radius:8px;font-size:12px;font-weight:600;color:var(--red);cursor:pointer">초기화</button>
      </div>

      <!-- 2열: 가입/실결/조사대상 + 나무조사 버튼 -->
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:6px;align-items:end;margin-bottom:6px">
        <div class="field">
          <label>가입주수</label>
          <input type="number" id="vi-reg-${vi}" class="inp${v.reg>0?' filled':''}" value="${v.reg||''}" inputmode="decimal"
            enterkeyhint="next"
            onfocus="this.style.background='#dceeff';this.style.borderColor='#185FA5';this.style.color='#185FA5';const _v=this.value;this.value='';this.value=_v;"
            onblur="varieties[${vi}].reg=+this.value||0;this.style.background=this.value?'#e8faf3':'white';this.style.borderColor=this.value?'#1D9E75':'#378ADD';this.style.color=this.value?'#0d5c35':'#1a1a1a';updateSummaryOnly();saveState()"
            oninput="this.classList.toggle('filled',this.value!='');varieties[${vi}].reg=+this.value||0"
            onkeydown="if(event.key==='Enter'){event.preventDefault();varieties[${vi}].reg=+this.value||0;const next=document.getElementById('vi-actual-${vi}');if(next){this.style.background=this.value?'#e8faf3':'white';this.style.borderColor=this.value?'#1D9E75':'#378ADD';this.style.color=this.value?'#0d5c35':'#1a1a1a';next.focus();}}">
        </div>
        <div class="field">
          <label>실제결과주수</label>
          <input type="number" id="vi-actual-${vi}" class="inp${v.actual>0?' filled':''}" value="${v.actual||''}" inputmode="decimal"
            enterkeyhint="done"
            onfocus="this.style.background='#dceeff';this.style.borderColor='#185FA5';this.style.color='#185FA5';const _v=this.value;this.value='';this.value=_v;"
            onblur="varieties[${vi}].actual=+this.value||0;this.style.background=this.value?'#e8faf3':'white';this.style.borderColor=this.value?'#1D9E75':'#378ADD';this.style.color=this.value?'#0d5c35':'#1a1a1a';quickUpdate(${vi},'actual',this.value);saveState()"
            oninput="this.classList.toggle('filled',this.value!='');varieties[${vi}].actual=+this.value||0"
            onkeydown="if(event.key==='Enter'){event.preventDefault();varieties[${vi}].actual=+this.value||0;this.blur();autoOpenSamples(${vi})}">
        </div>
        <div class="field">
          <label>조사대상주수</label>
          <input type="text" class="auto" id="vi-survey-${vi}" value="${surveyTarget>0?surveyTarget.toLocaleString()+'주':''}" readonly>
        </div>
        <button onclick="toggleTreeInspect(${vi})" id="tree-btn-${vi}"
            style="width:64px;height:40px;padding:0;border:1.5px solid ${v.treeOpen?'#0F6E56':'#1D9E75'};border-radius:8px;font-size:12px;font-weight:600;color:${v.treeOpen?'#fff':'#1D9E75'};background:${v.treeOpen?'#1D9E75':'transparent'};cursor:pointer;white-space:nowrap;flex-shrink:0">나무조사</button>
      </div>
      <!-- 3열: 고사/수확불능/미보상고사/미보상미고사 (접기/펼치기) -->
      <div id="tree-row-${vi}" style="display:${v.treeOpen?'grid':'none'};grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px;padding:10px;background:#F5F4F0;border-radius:8px;border:0.5px solid var(--border)">
        ${inp('dead', v.dead, '고사주수')}
        ${inp('unable', v.unable, '수확불능')}
        ${inp('uninsDead', v.uninsDead, '미보상고사')}
        ${inp('uninsAlive', v.uninsAlive, '미보상미고사')}
      </div>


      <!-- 표본주 입력 토글 (조사대상주 있을 때만 표시) -->
      ${surveyTarget > 0 ? `
      <div class="sample-toggle" onclick="toggleSamples(${vi})" style="display:flex;align-items:center;justify-content:space-between">
        <div style="display:flex;align-items:center;gap:6px">
          <span id="toggle-icon-${vi}">${v.open?'▼':'▶'}</span>
          <span>표본주 착과수</span>
          <span style="font-size:11px;color:var(--hint)" id="sample-status-${vi}">
            ${inputtedSamples>0?`(${inputtedSamples}/${properN}주 입력됨)`:''}
          </span>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <div style="font-size:12px;font-weight:600;color:var(--sub);white-space:nowrap">
            표본주 <span style="font-size:14px;color:var(--blue)" id="vi-proper-num-${vi}">${properN}</span>
            &nbsp;·&nbsp;
            간격 <span style="font-size:14px;color:var(--green)" id="vi-interval-${vi}">${properN>0?Math.round(surveyTarget/properN):0}</span>
          </div>
          <button onclick="event.stopPropagation();confirmSampleDel(${vi})"
            style="width:26px;height:26px;border:1.5px solid var(--border);border-radius:6px;background:transparent;font-size:15px;color:var(--sub);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1">－</button>
          <button onclick="event.stopPropagation();confirmSampleAdd(${vi})"
            style="width:26px;height:26px;border:1.5px solid var(--binp);border-radius:6px;background:transparent;font-size:15px;color:var(--blue);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1">＋</button>
        </div>
      </div>
      <div class="sample-section ${v.open?'open':''}" id="ss-${vi}">
        ${samplesHtml}
      </div>` : `
      <div id="ss-${vi}" style="display:none"></div>`}
    </div>`;
  }).join('');
}

// ── 품종별 자동계산 업데이트 (표본입력 시) ────────
function calcVariety(vi) {
  const v = varieties[vi];
  const surveyTarget = getSurveyTarget(v);
  const inputted = v.samples.filter(s => s!=='' && !isNaN(parseFloat(s)));
  const sampleSum = inputted.reduce((s,x) => s+(parseFloat(x)||0), 0);
  const perTree = inputted.length > 0 ? sampleSum / inputted.length : 0;
  const afterFruit = perTree > 0 && surveyTarget > 0 ? Math.round(perTree * surveyTarget) : 0;

  const sumEl = document.getElementById(`vi-sum-${vi}`);
  const perEl = document.getElementById(`vi-per-${vi}`);
  const afterEl = document.getElementById(`vi-after-${vi}`);
  if(sumEl) sumEl.value = sampleSum > 0 ? Math.round(sampleSum).toLocaleString() : '';
  if(perEl) perEl.value = perTree > 0 ? perTree.toFixed(1) : '';
  if(afterEl){
    afterEl.value = afterFruit > 0 ? afterFruit.toLocaleString() : '';
    afterEl.className = 'auto' + (afterFruit > 0 ? ' ok' : '');
  }
  saveState();
}

function toggleTreeInspect(vi) {
  varieties[vi].treeOpen = !varieties[vi].treeOpen;
  const row = document.getElementById(`tree-row-${vi}`);
  const btn = document.getElementById(`tree-btn-${vi}`);
  const isOpen = varieties[vi].treeOpen;
  if(row) row.style.display = isOpen ? 'grid' : 'none';
  if(btn) {
    btn.style.borderColor = isOpen ? '#0F6E56' : '#1D9E75';
    btn.style.color = isOpen ? '#fff' : '#1D9E75';
    btn.style.background = isOpen ? '#1D9E75' : 'transparent';
  }
  saveState();
}

function autoOpenSamples(vi) {
  varieties[vi].actual = +document.getElementById(`vi-actual-${vi}`)?.value || varieties[vi].actual;
  quickUpdate(vi, 'actual', varieties[vi].actual);
  setTimeout(() => {
    onInput();
    setTimeout(() => {
      const surveyTarget = getSurveyTarget(varieties[vi]);
      if(surveyTarget <= 0) return;
      varieties[vi].open = true;
      const ss = document.getElementById(`ss-${vi}`);
      const icon = document.getElementById(`toggle-icon-${vi}`);
      if(ss) ss.classList.add('open');
      if(icon) icon.textContent = '▼';
      const firstInput = ss?.querySelector('input');
      if(firstInput) {
        firstInput.focus();
        firstInput.scrollIntoView({behavior:'smooth', block:'start'});
        setTimeout(()=>window.scrollBy({top:-120, behavior:'smooth'}), 300);
      }
    }, 50);
  }, 0);
}

function toggleSamples(vi) {
  varieties[vi].open = !varieties[vi].open;
  const ss = document.getElementById(`ss-${vi}`);
  const icon = document.getElementById(`toggle-icon-${vi}`);
  ss.classList.toggle('open', varieties[vi].open);
  icon.textContent = varieties[vi].open ? '▼' : '▶';
}

function trimSamples(vi) {
  // 뒤에서부터 빈 값 제거 (리렌더링 없이 저장만)
  while (varieties[vi].samples.length > 0 && varieties[vi].samples[varieties[vi].samples.length-1] === '') {
    varieties[vi].samples.pop();
  }
  saveState();
}

function confirmSampleAdd(vi) {
  const v = varieties[vi];
  const name = v.name || `품종${vi+1}`;
  if(confirm(`${name} 표본주 1개를 추가할까요?`)) {
    addSampleRow(vi);
  }
}

function confirmSampleDel(vi) {
  const v = varieties[vi];
  const name = v.name || `품종${vi+1}`;
  const total = v.samples.length;
  if(total === 0) { showToast('삭제할 표본주가 없어요'); return; }
  if(confirm(`${name} 마지막 표본주(${total}번)를 삭제할까요?`)) {
    varieties[vi].samples.pop();
    onInput();
    saveState();
  }
}

function addSampleRow(vi) {
  varieties[vi].samples.push('');
  varieties[vi].open = true;
  onInput();
}

function resetVariety(vi) {
  const name = varieties[vi].name || `품종${vi+1}`;
  const overlay = document.getElementById('variety-reset-overlay');
  document.getElementById('variety-reset-title').textContent = `${name} 초기화`;
  document.getElementById('variety-reset-desc').textContent = `${name} 입력값을 모두 초기화할까요?\n초기화 후에는 되돌릴 수 없습니다.`;
  overlay.style.display = 'flex';
  document.getElementById('variety-reset-confirm-btn').onclick = () => {
    overlay.style.display = 'none';
    varieties[vi] = EMPTY_VARIETY();
    onInput();
    saveState();
  };
}

function addVariety() {
  if (varieties.length >= 10) { showToast('품종은 최대 10개까지 입력 가능해요'); return; }
  varieties.push({...EMPTY_VARIETY(), open:true});
  onInput();
  saveState();
}

function delVariety(vi) {
  if (varieties.length <= 1) { showToast('최소 1개 품종은 있어야 해요'); return; }
  varieties.splice(vi, 1);
  onInput();
  saveState();
}

// ── 기본정보 요약만 업데이트 (리렌더링 없이) ────────
function updateSummary() {
  const totalReg = varieties.reduce((s,v) => s + (v.reg||0), 0);
  const totalActual = varieties.reduce((s,v) => s + (v.actual||0), 0);
  const totalSurvey = varieties.reduce((s,v) => s + getSurveyTarget(v), 0);
  const properSample = getProperSample(totalSurvey);
  const avgFruit = toNum(document.getElementById('avg_fruit'));

  const ttEl = document.getElementById('total_trees');
  const taEl = document.getElementById('total_actual');
  const tsEl = document.getElementById('total_survey_disp');
  const psEl = document.getElementById('proper_sample');
  if(ttEl) ttEl.value = totalReg > 0 ? totalReg.toLocaleString()+'주' : '';
  if(taEl) taEl.value = totalActual > 0 ? totalActual.toLocaleString()+'주' : '';
  if(tsEl) tsEl.value = totalSurvey > 0 ? totalSurvey.toLocaleString()+'주' : '';
  if(psEl) psEl.value = properSample > 0 ? properSample+'주' : '';

  if (avgFruit > 0 && totalReg > 0) {
    const apEl = document.getElementById('avg_per_tree');
    if(apEl) apEl.value = (avgFruit / totalReg).toFixed(4)+'개';
  }

  let needReview = false;
  for (const v of varieties) {
    if (v.reg > 0 && v.actual > 0) {
      if (Math.abs(v.actual - v.reg) / v.reg > 0.05) { needReview = true; break; }
    }
  }
  const contractEl = document.getElementById('contract_yn');
  if(contractEl) {
    contractEl.value = totalReg > 0 ? (needReview ? '계약변경 대상' : '이상무') : '';
    contractEl.className = 'auto' + (needReview ? ' warn' : (totalReg > 0 ? ' ok' : ''));
    contractEl.style.color = needReview ? '#e24b4a' : '';
    contractEl.style.fontWeight = needReview ? '700' : '';
  }
}

// ── 입력값 변경시 자동계산 ─────────────────────────
function onInput() {
  const avgFruit = toNum(document.getElementById('avg_fruit'));

  // 전체 가입주수 합산
  const totalReg = varieties.reduce((s,v) => s + (v.reg||0), 0);
  // 전체 조사대상주 합산
  const totalSurvey = varieties.reduce((s,v) => s + getSurveyTarget(v), 0);
  const properSample = getProperSample(totalSurvey);

  const totalActual = varieties.reduce((s,v) => s + (v.actual||0), 0);
  document.getElementById('total_trees').value = totalReg > 0 ? totalReg.toLocaleString()+'주' : '';
  document.getElementById('total_actual').value = totalActual > 0 ? totalActual.toLocaleString()+'주' : '';
  document.getElementById('total_survey_disp').value = totalSurvey > 0 ? totalSurvey.toLocaleString()+'주' : '';
  document.getElementById('proper_sample').value = properSample > 0 ? properSample+'주' : '';
  updateSummaryBar(totalReg, totalSurvey, 0, properSample);

  // 2열: 고사/수확불능/미보상고사/미보상미고사 합계
  const totalDead = varieties.reduce((s,v) => s+(v.dead||0), 0);
  const totalUnable = varieties.reduce((s,v) => s+(v.unable||0), 0);
  const totalUninsDead = varieties.reduce((s,v) => s+(v.uninsDead||0), 0);
  const totalUninsAlive = varieties.reduce((s,v) => s+(v.uninsAlive||0), 0);
  const set = (id, val) => { const el=document.getElementById(id); if(el) el.value = val>0 ? val.toLocaleString()+'주' : ''; };
  set('total_dead', totalDead);
  set('total_unable', totalUnable);
  set('total_uninsDead', totalUninsDead);
  set('total_uninsAlive', totalUninsAlive);

  // 3열: 표본주수/합계/1주당/착과수 합계
  const totalSampleN = varieties.reduce((s,v) => s + v.samples.filter(x=>x!==''&&!isNaN(parseFloat(x))).length, 0);
  const totalSampleSum = varieties.reduce((s,v) => s + v.samples.reduce((ss,x)=>ss+(parseFloat(x)||0),0), 0);
  const totalPerTree = totalSampleN > 0 ? totalSampleSum / totalSampleN : 0;
  const totalAfterFruit = totalPerTree > 0 && totalSurvey > 0 ? Math.round(totalPerTree * totalSurvey) : 0;
  updateSummaryBar(totalReg, totalSurvey, totalSampleN, properSample);
  const snEl = document.getElementById('total_sampleN');
  const ssEl = document.getElementById('total_sampleSum');
  const spEl = document.getElementById('total_perTree');
  const afEl = document.getElementById('total_afterFruit');
  if(snEl) snEl.value = totalSampleN > 0 ? totalSampleN+'주' : '';
  if(ssEl) ssEl.value = totalSampleSum > 0 ? Math.round(totalSampleSum).toLocaleString() : '';
  if(spEl) spEl.value = totalPerTree > 0 ? totalPerTree.toFixed(1) : '';
  if(afEl){ afEl.value = totalAfterFruit > 0 ? totalAfterFruit.toLocaleString() : ''; afEl.className = 'auto' + (totalAfterFruit>0?' ok':''); }

  // 계약변경 여부 (품종별 주수 오차 ±5% 초과)
  let needReview = false;
  for (const v of varieties) {
    if (v.reg > 0 && v.actual > 0) {
      const ratio = Math.abs(v.actual - v.reg) / v.reg;
      if (ratio > 0.05) { needReview = true; break; }
    }
  }
  const contractEl = document.getElementById('contract_yn');
  contractEl.value = totalReg > 0 ? (needReview ? '계약변경 대상' : '이상무') : '';
  contractEl.className = 'auto' + (needReview ? ' warn' : (totalReg > 0 ? ' ok' : ''));
  contractEl.style.color = needReview ? '#e24b4a' : '';
  contractEl.style.fontWeight = needReview ? '700' : '';

  renderVarieties(totalSurvey, properSample);
}

// ── 계산 실행 ─────────────────────────────────────
function doCalc() {
  const avgFruit = toNum(document.getElementById('avg_fruit'));

  // 필수값 체크
  const missing = [];
  if (!avgFruit) missing.push('평년착과수');
  const hasActual = varieties.some(v => v.actual > 0);
  if (!hasActual) missing.push('실제결과주수');
  const hasSamples = varieties.some(v => v.samples.some(s => parseFloat(s) > 0));
  if (!hasSamples) missing.push('표본주 착과수');
  if (missing.length > 0) {
    showToast('입력 필요: ' + missing.join(', ')); return;
  }

  // 표본주 부족 경고 - ceil 방식
  const _totalSurvey = varieties.reduce((s,v) => s + getSurveyTarget(v), 0);
  const _totalProper = getProperSample(_totalSurvey);
  const shortVarieties = [];
  for (const v of varieties) {
    const _st = getSurveyTarget(v);
    if (_st <= 0) continue;
    const _pn = Math.max(1, Math.ceil(_totalProper * _st / _totalSurvey));
    const inputted = v.samples.filter(s => s!=='' && !isNaN(parseFloat(s))).length;
    if (inputted < _pn) shortVarieties.push(`${v.name||'미입력'} (${inputted}/${_pn}주)`);
  }
  if (shortVarieties.length > 0) {
  // 표본 부족 경고는 토스트로
  }

  // 품종별 계산
  let totalAfterFruit = 0;
  let totalSampleUsed = 0;
  const results = [];

  for (const v of varieties) {
    const surveyTarget = getSurveyTarget(v);
    if (surveyTarget <= 0) continue;

    const validSamples = v.samples.filter(s => s!=='' && !isNaN(parseFloat(s)));
    const sampleSum = validSamples.reduce((s,x) => s + parseFloat(x), 0);
    const sampleCount = validSamples.length;
    if (sampleCount === 0) continue;

    const perTree = sampleSum / sampleCount;
    const afterFruit = Math.round(perTree * surveyTarget * 10) / 10;

    totalAfterFruit += afterFruit;
    totalSampleUsed += sampleCount;

    results.push({
      name: v.name || `품종${varieties.indexOf(v)+1}`,
      surveyTarget,
      sampleCount,
      sampleSum,
      perTree,
      afterFruit
    });
  }

  const rate = avgFruit > 0 ? totalAfterFruit / avgFruit : 0;
  const needReview = varieties.some(v => v.reg>0 && v.actual>0 && Math.abs(v.actual-v.reg)/v.reg>0.05);

  // 메인 결과 박스
  const rateEl = document.getElementById('result-rate');
  rateEl.textContent = (rate * 100).toFixed(2)+'%';
  rateEl.style.color = rate >= 1 ? '#A8F0D8' : rate >= 0.8 ? '#FFE082' : '#FFD0D0';

  // 간이 결과 박스
  document.getElementById('r-avg').textContent = avgFruit.toLocaleString()+'개';
  const rTotal = document.getElementById('r-total');
  rTotal.textContent = Math.round(totalAfterFruit).toLocaleString()+'개';
  rTotal.style.color = rate >= 1 ? '#1D9E75' : rate >= 0.8 ? '#E8860A' : '#e24b4a';
  const rContract = document.getElementById('r-contract');
  rContract.textContent = needReview ? '계약변경대상' : '이상무';
  rContract.style.color = needReview ? '#e24b4a' : '#1D9E75';

  document.getElementById('result-section').classList.add('show');
  document.getElementById('result-detail-section').classList.add('show');

  document.getElementById('result-section').classList.add('show');

  const btn = document.getElementById('calc-btn');
  btn.classList.add('done');
  btn.innerHTML = '<span>✅</span><span>계산 완료!</span>';
  setTimeout(() => {
    btn.classList.remove('done');
    btn.innerHTML = '<span>🧮</span><span>착과수 계산</span>';
  }, 2000);
  document.getElementById('result-section').scrollIntoView({behavior:'smooth', block:'start'});
}

// ── 초기화 ───────────────────────────────────────
// ── localStorage 저장/불러오기 ────────────────────
function saveState(){
  try{
    allData[currentCrop].avgFruit = document.getElementById('avg_fruit').value;
    allData[currentCrop].varieties = varieties;
    localStorage.setItem('apple_multi_state', JSON.stringify({
      currentCrop,
      allData
    }));
  }catch(e){}
}

function loadState(){
  try{
    const raw = localStorage.getItem('apple_multi_state');
    if(!raw) return false;
    const s = JSON.parse(raw);
    if(s.allData) {
      for(const crop of Object.keys(allData)){
        if(s.allData[crop]){
          if(s.allData[crop].avgFruit !== undefined) allData[crop].avgFruit = s.allData[crop].avgFruit;
          if(s.allData[crop].varieties?.length > 0) allData[crop].varieties = s.allData[crop].varieties;
        }
      }
    }
    if(s.currentCrop) {
      currentCrop = s.currentCrop;
      const idx = {'apple':0,'pear':1,'sweetpersimmon':2,'persimmon':3}[currentCrop]||0;
      document.querySelectorAll('.crop-tab').forEach((t,i) => t.classList.toggle('on', i===idx));
    }
    varieties = allData[currentCrop].varieties;
    const af = document.getElementById('avg_fruit');
    af.value = allData[currentCrop].avgFruit || '';
    if(af.value) af.classList.add('filled');
    return true;
  }catch(e){ return false; }
}

function resetAll() {
  allData[currentCrop].avgFruit = '';
  allData[currentCrop].varieties = [EMPTY_VARIETY()];
  varieties = allData[currentCrop].varieties;
  document.getElementById('avg_fruit').value = '';
  document.getElementById('avg_fruit').classList.remove('filled');
  document.getElementById('result-section').classList.remove('show');
  document.getElementById('result-detail-section').classList.remove('show');
  saveState();
  onInput();
  window.scrollTo({top:0, behavior:'smooth'});
}

// ── 갤러리 저장 ───────────────────────────────────
async function saveImage() {
  try {
    const el = document.querySelector('.content');
    const canvas = await html2canvas(el, {backgroundColor:'#F5F4F0', scale:2, useCORS:true, windowWidth:420});
    const link = document.createElement('a');
    const now = new Date();
    const stamp = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
    link.download = `다품종착과율_${stamp}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
    document.getElementById('save-overlay').classList.add('show');
  } catch(e) {
    showToast('저장 중 오류가 발생했어요');
  }
}

// ── 서비스워커 캐시 제거 ──────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
  caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k))));
}

// ── 초기 실행 ─────────────────────────────────────
// 저장된 상태 불러오기
const _loaded = loadState();
onInput();
</script>
