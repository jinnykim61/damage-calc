<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="theme-color" content="#185FA5">
<title>벼 피해율 계산기</title>
<!-- v1776425406 -->
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --blue:#185FA5;--blue2:#378ADD;
  --auto:#F3F1EA;--border:#D8D6CE;--binp:#378ADD;
  --text:#1a1a1a;--sub:#666;--hint:#aaa;
  --bg:#F5F4F0;--card:#fff;
  --red:#e24b4a;--green:#1D9E75;
  --r:12px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
.header{background:var(--blue);color:white;padding:14px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:10px}
.back-btn{width:32px;height:32px;background:rgba(255,255,255,0.15);border:none;border-radius:8px;color:white;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.header-icon{width:28px;height:28px;background:rgba(255,255,255,0.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.header h1{font-size:16px;font-weight:600}
.header-sub{font-size:11px;opacity:0.75;margin-top:1px}
.mode-tabs{display:flex;background:var(--card);border-bottom:0.5px solid var(--border);padding:0 12px;gap:6px}
.mode-tab{flex:1;height:38px;border:1.5px solid var(--border);background:white;font-size:13px;font-weight:600;color:var(--sub);cursor:pointer;border-radius:var(--rs);margin:6px 0}
.mode-tab.on{background:#e8faf3;border-color:var(--green);color:#0d5c35}
.legend{display:flex;gap:12px;padding:8px 16px;background:var(--card);border-bottom:0.5px solid var(--border)}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--sub)}
.dot-inp{width:10px;height:10px;border-radius:2px;background:white;border:1.5px solid var(--binp)}
.dot-filled{width:10px;height:10px;border-radius:2px;background:#e8faf3;border:1.5px solid var(--green)}
.dot-auto{width:10px;height:10px;border-radius:2px;background:var(--auto);border:0.5px solid var(--border)}
.content{padding:12px 12px 40px}
.section{background:var(--card);border-radius:var(--r);padding:14px;margin-bottom:10px;border:0.5px solid var(--border)}
.sec-title{font-size:12px;font-weight:600;color:var(--sub);margin-bottom:10px;letter-spacing:0.04em}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-head .sec-title{margin-bottom:0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px}
.field{display:flex;flex-direction:column;gap:3px}
.field label{font-size:11px;color:var(--sub);font-weight:500}
input.inp,select.inp{height:40px;border:1.5px solid var(--binp);border-radius:var(--rs);padding:0 8px;font-size:14px;background:white;color:var(--text);width:100%;-webkit-appearance:none;transition:background 0.15s;text-align:center}
select.inp{text-align:left}
input.inp:focus,select.inp:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(55,138,221,0.15)}
input.inp.filled{background:#e8faf3;border-color:var(--green);color:#0d5c35}
select.inp.filled{background:#e8faf3;border-color:var(--green);color:#0d5c35}
input.auto{height:40px;border:0.5px solid var(--border);border-radius:var(--rs);padding:0 8px;font-size:14px;background:var(--auto);color:var(--sub);width:100%;text-align:center}
.reset-btn{height:34px;padding:0 14px;background:transparent;border:1.5px solid var(--red);border-radius:var(--rs);color:var(--red);font-size:13px;font-weight:600;cursor:pointer}

/* 표본구간 그리드 */
.sample-grid{display:grid;gap:6px;margin-bottom:8px}
.sample-cell{display:flex;flex-direction:row;align-items:center;gap:4px}
.sample-no{font-size:13px;font-weight:700;color:var(--sub);min-width:18px;text-align:right;flex-shrink:0}

/* 결과 */
.result-box{background:var(--blue);border-radius:var(--r);padding:18px 16px;margin-bottom:10px;color:white}
.result-box.pending{background:#888;opacity:0.5}
.result-pct{font-size:40px;font-weight:700;line-height:1}
.save-btn{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);color:white;border-radius:var(--rs);padding:10px 14px;font-size:12px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;white-space:nowrap}
.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.metric{background:rgba(255,255,255,0.15);border-radius:var(--rs);padding:10px 8px;text-align:center}
.metric .ml{font-size:10px;opacity:0.75;margin-bottom:4px}
.metric .mv{font-size:13px;font-weight:600}
.drow{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:0.5px solid rgba(255,255,255,0.15)}
.drow:last-child{border-bottom:none}
.drow span:first-child{opacity:0.75}
.drow span:last-child{font-weight:600}

/* 팝업 */
#save-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;align-items:center;justify-content:center}
#save-overlay.show{display:flex}
.save-modal{background:white;border-radius:var(--r);padding:24px 20px;text-align:center;width:260px}
.save-modal p{font-size:14px;margin-bottom:16px;color:var(--sub)}
.save-modal .btn-ok{width:100%;height:42px;background:var(--blue);color:white;border:none;border-radius:var(--rs);font-size:14px;font-weight:600;cursor:pointer}
</style>
</head>
<body>
<div class="header">
  <button class="back-btn" onclick="location.href='./index.html'">‹</button>
  <div class="header-icon">🌾</div>
  <div>
    <h1>벼 피해율 계산기</h1>
    <div class="header-sub">논작물 · 수확량조사</div>
  </div>
</div>

<div class="mode-tabs">
  <button class="mode-tab on" id="tab-sample" onclick="setMode('sample')">표본조사</button>
  <button class="mode-tab" id="tab-full" onclick="setMode('full')">전수조사</button>
</div>

<div class="legend">
  <div class="legend-item"><div class="dot-inp"></div>직접 입력</div>
  <div class="legend-item"><div class="dot-filled"></div>입력 완료</div>
  <div class="legend-item"><div class="dot-auto"></div>자동 계산</div>
</div>

<div class="content">

  <!-- 보험가입사항 -->
  <div class="section">
    <div class="sec-head">
      <div class="sec-title">① 보험가입사항</div>
      <button class="reset-btn" onclick="resetAll()">전체 초기화</button>
    </div>
    <!-- 품종 + 병충해 -->
    <div class="g2">
      <div class="field">
        <label>품종</label>
        <select id="variety" class="inp filled" onchange="markFilled(this);calc()">
          <option value="mebyeo">메벼</option>
          <option value="chalbyeo">찰벼</option>
          <option value="bunjil">분질미</option>
        </select>
      </div>
      <div class="field">
        <label>병충해단독사고</label>
        <div style="display:flex;height:40px;gap:6px">
          <label style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px;border:1.5px solid var(--border);border-radius:var(--rs);background:white;cursor:pointer" id="dis-y-label">
            <input type="radio" name="disease" id="dis-y" value="y" onchange="onDiseaseChk()" style="accent-color:#e24b4a;cursor:pointer">
            <span style="font-size:14px;font-weight:600;color:var(--sub)">여</span>
          </label>
          <label style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px;border:1.5px solid var(--border);border-radius:var(--rs);background:white;cursor:pointer" id="dis-n-label">
            <input type="radio" name="disease" id="dis-n" value="n" checked onchange="onDiseaseChk()" style="accent-color:var(--blue);cursor:pointer">
            <span style="font-size:14px;font-weight:600;color:var(--sub)">부</span>
          </label>
        </div>
      </div>
    </div>
    <!-- 평년수확량 / 가입면적 / 계약변경 / 표본구간수 -->
    <div style="display:grid;grid-template-columns:1fr 1fr 0.75fr 0.75fr;gap:6px;margin-bottom:8px">
      <div class="field">
        <label>평년수확량 <span style="font-size:10px;color:var(--hint)">(kg)</span></label>
        <input type="text" id="avgYield" class="inp" inputmode="decimal"
          oninput="onCommaInput(this)" onblur="calc()">
      </div>
      <div class="field">
        <label>가입면적 <span style="font-size:10px;color:var(--hint)">㎡</span></label>
        <input type="text" id="insArea" class="inp" inputmode="decimal"
          oninput="onCommaInput(this)" onblur="calc()">
      </div>
      <div class="field">
        <label>계약변경</label>
        <input type="text" id="contractYn" class="auto" readonly>
      </div>
      <div class="field">
        <label>표본구간</label>
        <input type="text" id="properSampleDisp" class="auto" readonly>
      </div>
    </div>
    <!-- 면적 라인 -->
    <div style="display:grid;grid-template-columns:1.1fr 1fr 1.1fr 0.8fr;gap:6px;margin-bottom:8px">
      <div class="field">
        <label>실경작면적 <span style="font-size:10px;color:var(--hint)">㎡</span></label>
        <input type="text" id="actArea" class="inp" inputmode="decimal"
          oninput="onCommaInput(this)" onblur="calc()">
      </div>
      <div class="field">
        <label>고사면적 <span style="font-size:10px;color:var(--hint)">㎡</span></label>
        <input type="number" id="deadArea" class="inp" inputmode="decimal"
          placeholder="0" oninput="markFilled(this)" onblur="calc()">
      </div>
      <div class="field">
        <label>타작물미보상 <span style="font-size:10px;color:var(--hint)">㎡</span></label>
        <input type="number" id="uninsArea" class="inp" inputmode="decimal"
          placeholder="0" oninput="markFilled(this)" onblur="calc()">
      </div>
      <div class="field">
        <label>기수확 <span style="font-size:10px;color:var(--hint)">㎡</span></label>
        <input type="number" id="preArea" class="inp" inputmode="decimal"
          placeholder="0" oninput="markFilled(this)" onblur="calc()">
      </div>
    </div>
    <!-- 조사대상 / 기준함수율 / 미보상비율 -->
    <div class="g3">
      <div class="field">
        <label>조사대상면적</label>
        <input type="text" id="surveyArea" class="auto" readonly>
      </div>
      <div class="field">
        <label>기준함수율</label>
        <input type="text" id="stdMoisture" class="auto" readonly>
      </div>
      <div class="field">
        <label>미보상비율 (%)</label>
        <input type="number" id="uninsRate" class="inp" inputmode="decimal"
          placeholder="0" oninput="markFilled(this)" onblur="calc()">
      </div>
    </div>
  </div>

  <!-- 표본조사 -->
  <div id="sec-sample">
    <div class="section">
      <div class="sec-head">
        <div class="sec-title">② 표본구간 설정</div>
        <div style="font-size:11px;color:var(--hint)">단위: m</div>
      </div>
      <div class="g3">
        <div class="field">
          <label>이랑길이</label>
          <input type="number" id="rowLen" class="inp" inputmode="decimal" step="0.01"
            oninput="markFilled(this)" onblur="calc()">
        </div>
        <div class="field">
          <label>이랑폭</label>
          <input type="number" id="rowWid" class="inp" inputmode="decimal" step="0.01"
            oninput="markFilled(this)" onblur="calc()">
        </div>
        <div class="field">
          <label>표본구간면적</label>
          <input type="text" id="sampleArea" class="auto" readonly>
        </div>
      </div>
      <div class="g2">
        <div class="field">
          <label>적정 표본구간수</label>
          <input type="text" id="properSample" class="auto" readonly>
        </div>
        <div class="field">
          <label>함수율</label>
          <input type="number" id="moisture" class="inp" inputmode="decimal" step="0.1"
            placeholder="0.0" oninput="markFilled(this)" onblur="calc()">
        </div>
      </div>
    </div>

    <div class="section">
      <div class="sec-head">
        <div class="sec-title">③ 표본구간별 수확량 <span style="font-size:11px;color:var(--hint)">(g)</span></div>
        <div style="font-size:11px;color:var(--hint)" id="sample-inputted"></div>
      </div>
      <div id="sample-inputs"></div>
      <div class="g2">
        <div class="field">
          <label>표본수확량 합계</label>
          <input type="text" id="sampleTotal" class="auto" readonly>
        </div>
        <div class="field">
          <label>표본구간m²당 유효중량</label>
          <input type="text" id="effWeight" class="auto" readonly>
        </div>
      </div>
    </div>
  </div>

  <!-- 전수조사 -->
  <div id="sec-full" style="display:none">
    <div class="section">
      <div class="sec-title">② 전수조사 수확량</div>
      <div class="g3">
        <div class="field">
          <label>총수확량 (kg)</label>
          <input type="text" id="fullYield" class="inp" inputmode="decimal"
            oninput="onCommaInput(this)" onblur="calc()">
        </div>
        <div class="field">
          <label>함수율</label>
          <input type="number" id="fullMoisture" class="inp" inputmode="decimal" step="0.1"
            placeholder="0.0" oninput="markFilled(this)" onblur="calc()">
        </div>
        <div class="field">
          <label>조사수확량 (kg)</label>
          <input type="text" id="fullSurvey" class="auto" readonly>
        </div>
      </div>
    </div>
  </div>

  <!-- 결과 -->
  <div class="result-box pending" id="result-section">
    <div style="text-align:center;margin-bottom:16px">
      <div style="font-size:12px;opacity:0.8;margin-bottom:4px">피해율</div>
      <div class="result-pct" id="result-pct">입력 대기중</div>
    </div>
    <div style="display:flex;justify-content:flex-end;margin-top:-50px;margin-bottom:16px">
      <button class="save-btn" onclick="saveImage()">
        <span style="font-size:20px">📷</span>
        <span>갤러리 저장</span>
      </button>
    </div>
    <div class="metrics">
      <div class="metric"><div class="ml">평년수확량</div><div class="mv" id="r-avg">-</div></div>
      <div class="metric"><div class="ml">조사수확량</div><div class="mv" id="r-survey">-</div></div>
    </div>
    <div class="drow"><span>유효중량(m²당)</span><span id="r-eff">-</span></div>
    <div class="drow"><span>조사대상면적</span><span id="r-area">-</span></div>
    <div class="drow"><span>미보상감수량</span><span id="r-unins">-</span></div>
    <div class="drow" id="drow-disease" style="display:none"><span>⚠️ 병충해단독사고</span><span style="color:#FFE082">최고한도 70%</span></div>
  </div>

</div>

<div id="save-overlay">
  <div class="save-modal">
    <div style="font-size:36px;margin-bottom:10px">✅</div>
    <p>결과가 갤러리에 저장됐어요!</p>
    <button class="btn-ok" onclick="document.getElementById('save-overlay').classList.remove('show')">확인</button>
  </div>
</div>

<script>
let mode = 'sample';

const STD_MOISTURE = {mebyeo: 0.15, chalbyeo: 0.13, bunjil: 0.14};
const VARIETY_LABEL = {mebyeo:'메벼', chalbyeo:'찰벼', bunjil:'분질미'};

function onDiseaseChk(){
  const isY = document.getElementById('dis-y').checked;
  const nLbl = document.getElementById('dis-n-label');
  const yLbl = document.getElementById('dis-y-label');
  if(isY){
    yLbl.style.borderColor='#e24b4a'; yLbl.style.background='#fff5f5';
    yLbl.querySelector('span').style.color='#e24b4a';
    nLbl.style.borderColor='var(--border)'; nLbl.style.background='white';
    nLbl.querySelector('span').style.color='var(--sub)';
  } else {
    nLbl.style.borderColor='var(--green)'; nLbl.style.background='#e8faf3';
    nLbl.querySelector('span').style.color='#0d5c35';
    yLbl.style.borderColor='var(--border)'; yLbl.style.background='white';
    yLbl.querySelector('span').style.color='var(--sub)';
  }
  calc();
}

function toNum(el){ return parseFloat((el.value||'').replace(/,/g,''))||0; }
function onCommaInput(el){
  const raw = el.value.replace(/,/g,'').replace(/[^0-9.]/g,'');
  const parts = raw.split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  el.value = parts.join('.');
  el.classList.toggle('filled', el.value !== '');
}
function markFilled(el){ el.classList.toggle('filled', el.value !== ''); }

function setMode(m){
  mode = m;
  document.getElementById('tab-sample').className = 'mode-tab' + (m==='sample'?' on':'');
  document.getElementById('tab-full').className = 'mode-tab' + (m==='full'?' on':'');
  document.getElementById('sec-sample').style.display = m==='sample' ? '' : 'none';
  document.getElementById('sec-full').style.display = m==='full' ? '' : 'none';
  calc();
}

function getProperSample(area){
  if(area<=1999) return 3;
  if(area<=2999) return 4;
  if(area<=3999) return 5;
  if(area<=4999) return 6;
  if(area<=5999) return 7;
  return 8;
}

function renderSampleInputs(proper){
  const container = document.getElementById('sample-inputs');
  // 4열 2행 가로 순서 (1,2,3,4 / 5,6,7,8)
  let html = `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px;width:100%;overflow:hidden">`;
  for(let si=0; si<8; si++){
    const active = si < proper;
    const bc = active ? 'var(--binp)' : 'var(--border)';
    const bg = active ? 'white' : 'var(--auto)';
    html += `<div style="display:flex;flex-direction:column;gap:2px;min-width:0">
      <span style="font-size:12px;font-weight:700;color:${active?'var(--sub)':'var(--hint)'};text-align:center">${si+1}</span>
      <input type="number" inputmode="decimal" placeholder="${active?'-':'—'}" id="sp${si}"
        ${active ? '' : 'disabled'}
        style="width:100%;height:40px;border:1.5px solid ${bc};border-radius:6px;font-size:15px;font-weight:600;background:${bg};color:${active?'var(--text)':'var(--hint)'};text-align:center;-webkit-appearance:none;box-sizing:border-box"
        oninput="this.style.background=this.value?'#e8faf3':'white';this.style.borderColor=this.value?'#1D9E75':'#378ADD';this.style.color=this.value?'#0d5c35':'#1a1a1a'"
        onblur="calc()">
    </div>`;
  }
  html += '</div>';
  container.innerHTML = html;
}

let lastProper = 0;

function calc(){
  const avgYield = toNum(document.getElementById('avgYield'));
  const insArea = toNum(document.getElementById('insArea'));
  const actArea = toNum(document.getElementById('actArea'));
  const deadArea = parseFloat(document.getElementById('deadArea').value)||0;
  const uninsArea = parseFloat(document.getElementById('uninsArea').value)||0;
  const preArea = parseFloat(document.getElementById('preArea').value)||0;
  const variety = document.getElementById('variety').value;
  const disease = document.getElementById('dis-y')?.checked ? 'y' : 'n';
  const uninsRate = (parseFloat(document.getElementById('uninsRate').value)||0)/100;

  const realArea = actArea || insArea;
  const stdMoisture = STD_MOISTURE[variety];

  // 계약변경여부
  const areaErr = insArea > 0 && actArea > 0 ? (actArea - insArea) / insArea : 0;
  const contractEl = document.getElementById('contractYn');
  if(insArea > 0 && actArea > 0){
    contractEl.value = Math.abs(areaErr) > 0.1 ? '계약변경' : '이상무';
    contractEl.style.color = Math.abs(areaErr) > 0.1 ? '#e24b4a' : '';
    contractEl.style.fontWeight = Math.abs(areaErr) > 0.1 ? '700' : '';
  } else { contractEl.value = ''; }

  // 면적 10% 초과시 변경 평년수확량
  const effAvg = (insArea > 0 && actArea > 0 && Math.abs(areaErr) > 0.1)
    ? Math.round(avgYield * (actArea / insArea) * 10) / 10
    : avgYield;

  // 기준함수율
  document.getElementById('stdMoisture').value = (stdMoisture*100).toFixed(0) + '%';

  // 조사대상면적
  const surveyArea = Math.max(0, realArea - deadArea - uninsArea - preArea);
  document.getElementById('surveyArea').value = surveyArea > 0 ? surveyArea.toLocaleString('ko-KR') + ' ㎡' : '';

  const resultBox = document.getElementById('result-section');
  const pctEl = document.getElementById('result-pct');

  if(mode === 'sample'){
    const rowLen = parseFloat(document.getElementById('rowLen').value)||0;
    const rowWid = parseFloat(document.getElementById('rowWid').value)||0;
    const moisture = (parseFloat(document.getElementById('moisture').value)||0)/100;

    // 표본구간면적 = ROUND(이랑길이×이랑폭, 2)
    const unitArea = Math.round((rowLen * rowWid + Number.EPSILON) * 100) / 100;
    document.getElementById('sampleArea').value = unitArea > 0 ? unitArea + ' ㎡/구간' : '';

    // 적정 표본구간수
    const proper = surveyArea > 0 ? getProperSample(surveyArea) : 0;
    document.getElementById('properSample').value = proper > 0 ? proper + '구간' : '';
    document.getElementById('properSampleDisp').value = proper > 0 ? String(proper) : '';

    // 표본 입력칸 - 면적 있을때만 렌더링
    if(proper === 0){
      document.getElementById('sample-inputs').innerHTML='';
      lastProper = -1;
    } else if(proper !== lastProper){
      lastProper = proper;
      renderSampleInputs(proper);
    }

    // 표본수확량 합계
    let sampleTotal = 0;
    let inputted = 0;
    for(let i=0; i<proper; i++){
      const el = document.getElementById('sp'+i);
      if(el && el.value !== ''){
        sampleTotal += parseFloat(el.value)||0;
        inputted++;
      }
    }
    const inputtedDisp = document.getElementById('sample-inputted');
    if(inputtedDisp) inputtedDisp.textContent = inputted > 0 ? `${inputted}/${proper}구간 입력` : '';
    document.getElementById('sampleTotal').value = sampleTotal > 0 ? sampleTotal + ' g' : '';

    const totalSampleArea = unitArea * proper;

    // 유효중량 = ROUNDDOWN((표본수확량합/1000 × 0.93 × (1-함수율)/(1-기준함수율)) / 표본구간면적합, 2)
    let effWeight = 0;
    if(totalSampleArea > 0 && moisture > 0 && sampleTotal > 0){
      effWeight = Math.floor(((sampleTotal/1000) * 0.93 * (1-moisture)/(1-stdMoisture)) / totalSampleArea * 100) / 100;
    }
    document.getElementById('effWeight').value = effWeight > 0 ? effWeight + ' kg/㎡' : '';

    if(!avgYield || !surveyArea || inputted < proper || !moisture){
      resultBox.className = 'result-box pending';
      pctEl.textContent = '입력 대기중';
      return;
    }

    // 단위면적당 평년수확량
    const unitAvg = realArea > 0 ? avgYield / realArea : 0;
    // 수확량 = (유효중량 × 조사대상) + (단위면적당평년 × (타작물·미보상+기수확))
    const surveyYield = Math.floor(effWeight * surveyArea);
    const addYield = unitAvg * (uninsArea + preArea);
    const totalYield = Math.floor(surveyYield + addYield);

    // 미보상감수량 (병충해단독=여이면 0, 최고한도70%)
    // 업무방법서 기준: 병충해단독사고도 미보상감수량 계산, 단 최고한도 70%
    const uninsLoss = Math.round(Math.max(0, effAvg - totalYield) * uninsRate * 10000) / 10000;

    // 피해율 ROUNDDOWN
    let pihaeyul = Math.floor((effAvg - totalYield - uninsLoss) / effAvg * 10000) / 10000;
    pihaeyul = Math.max(0, pihaeyul);
    // 병충해단독사고: 최고한도 70%
    if(disease === 'y') pihaeyul = Math.min(pihaeyul, 0.7);

    showResult(resultBox, pctEl, effAvg, totalYield, effWeight + ' kg/㎡', surveyArea, uninsLoss, pihaeyul, disease==='y');

  } else {
    // 전수조사
    const fullYield = toNum(document.getElementById('fullYield'));
    const fullMoisture = parseFloat(document.getElementById('fullMoisture').value)||0;

    if(fullMoisture > 0 && fullYield > 0){
      // 수확량 = 총수확량 × (1-함수율)/(1-기준함수율)
      const surveyYield = Math.floor(fullYield * (1-fullMoisture)/(1-stdMoisture));
      document.getElementById('fullSurvey').value = surveyYield.toLocaleString('ko-KR') + ' kg';

      if(!avgYield){ resultBox.className='result-box pending'; pctEl.textContent='입력 대기중'; return; }

      // 미보상감수량 (병충해단독이어도 미보상 계산, 단 최고한도 70%)
      // 단위면적당 평년수확량 × (타작물+기수확) 가산
      const unitAvgF = realArea > 0 ? avgYield / realArea : 0;
      const addYieldF = unitAvgF * (uninsArea + preArea);
      const totalYieldF = Math.floor(surveyYield + addYieldF);
      const uninsLoss = Math.round(Math.max(0, avgYield - totalYieldF) * uninsRate * 10000) / 10000;
      let pihaeyul = Math.floor((effAvg - totalYieldF - uninsLoss) / effAvg * 10000) / 10000;
      pihaeyul = Math.max(0, pihaeyul);
      if(disease === 'y') pihaeyul = Math.min(pihaeyul, 0.7);

      showResult(resultBox, pctEl, effAvg, totalYieldF, '-', surveyArea, uninsLoss, pihaeyul, disease==='y');
    } else {
      resultBox.className = 'result-box pending';
      pctEl.textContent = '입력 대기중';
    }
  }

  saveState();
}

function showResult(box, pctEl, avg, survey, eff, area, unins, pihaeyul, isDis){
  box.className = 'result-box';
  pctEl.textContent = (pihaeyul*100).toFixed(2) + '%';
  pctEl.style.color = pihaeyul >= 0.2 ? '#FFD0D0' : '#A8F0D8';
  document.getElementById('r-avg').textContent = avg.toLocaleString('ko-KR') + ' kg';
  document.getElementById('r-survey').textContent = survey.toLocaleString('ko-KR') + ' kg';
  document.getElementById('r-eff').textContent = eff;
  document.getElementById('r-area').textContent = area.toLocaleString('ko-KR') + ' ㎡';
  document.getElementById('r-unins').textContent = isDis ? '해당없음' : unins.toLocaleString('ko-KR') + ' kg';
  document.getElementById('drow-disease').style.display = isDis ? 'flex' : 'none';
}

function saveState(){
  const ids = ['avgYield','insArea','actArea','deadArea','uninsArea','preArea',
               'variety','uninsRate','rowLen','rowWid','moisture','fullYield','fullMoisture'];
  const state = {mode, disease: document.getElementById('dis-y')?.checked ? 'y' : 'n'};
  ids.forEach(id => { const el=document.getElementById(id); if(el) state[id]=el.value; });
  try{ localStorage.setItem('rice_state', JSON.stringify(state)); }catch(e){}
}

function loadState(){
  try{
    const raw = localStorage.getItem('rice_state');
    if(!raw) return;
    const s = JSON.parse(raw);
    if(s.mode) {} // mode는 항상 sample로 시작
    if(s.disease === 'y'){
      const dy = document.getElementById('dis-y');
      if(dy){ dy.checked = true; onDiseaseChk(); }
    } else { onDiseaseChk(); }
    Object.keys(s).forEach(id => {
      if(id==='mode') return;
      const el = document.getElementById(id);
      if(el && s[id]!==''){ el.value=s[id]; el.classList.toggle('filled', true); }
    });
  }catch(e){}
}

function resetAll(){
  if(!confirm('모든 입력값을 초기화할까요?')) return;
  try{ localStorage.removeItem('rice_state'); }catch(e){}
  ['avgYield','insArea','actArea','deadArea','uninsArea','preArea','uninsRate',
   'rowLen','rowWid','moisture','fullYield','fullMoisture'].forEach(id=>{
    const el=document.getElementById(id); if(el){el.value='';el.classList.remove('filled');}
  });
  document.getElementById('variety').value='mebyeo';
  const dn = document.getElementById('dis-n');
  if(dn){ dn.checked=true; onDiseaseChk(); }

  document.getElementById('sample-inputs').innerHTML='';
  const psd=document.getElementById('properSampleDisp'); if(psd) psd.value='';
  const ps=document.getElementById('properSample'); if(ps) ps.value='';
  const sa=document.getElementById('surveyArea'); if(sa) sa.value='';
  const ka=document.getElementById('sampleArea'); if(ka) ka.value='';
  lastProper=-1;
  document.getElementById('result-section').className='result-box pending';
  document.getElementById('result-pct').textContent='입력 대기중';
  window.scrollTo({top:0,behavior:'smooth'});
}

async function saveImage(){
  try{
    const canvas = await html2canvas(document.querySelector('.content'),{backgroundColor:'#F5F4F0',scale:2,useCORS:true,windowWidth:420});
    const link = document.createElement('a');
    const now = new Date();
    const stamp=`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
    link.download=`벼피해율_${stamp}.png`; link.href=canvas.toDataURL('image/png'); link.click();
    document.getElementById('save-overlay').classList.add('show');
  }catch(e){ alert('저장 중 오류가 발생했어요.'); }
}

if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(r=>r.forEach(s=>s.unregister()));
  caches.keys().then(k=>Promise.all(k.map(c=>caches.delete(c))));
}

loadState();
setMode('sample');
lastProper=-1;
setTimeout(calc, 50);
</script>
