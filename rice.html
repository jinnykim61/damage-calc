<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>벼 출력창 적용본 v2</title>
<style>
body{font-family:sans-serif;background:#f5f5f5;padding:20px}
.card{background:#fff;border-radius:18px;padding:16px}
table{width:100%;border-collapse:collapse;table-layout:fixed;text-align:center}
th,td{border:1px solid #ccc;padding:12px;height:60px}
th{background:#4a7aad;color:#fff}
.green{background:#dff0e9;font-weight:700}
.auto{background:#f3f1ea}
</style>
</head>
<body>
<div class="card">
<h3>4. 표본구간별 수확량</h3>
<table>
<colgroup>
<col style="width:14%"><col style="width:14%"><col style="width:14%"><col style="width:14%">
<col style="width:14%"><col style="width:15%"><col style="width:15%">
</colgroup>

<tr>
<th>1</th><th>2</th><th>3</th><th>4</th>
<th rowspan="2">합계</th>
<th rowspan="2">함수율</th>
<th rowspan="2">미보상<br>비율</th>
</tr>

<tr>
<td class="green">218</td>
<td class="green">160</td>
<td class="green">200</td>
<td class="green">158</td>
</tr>

<tr>
<th>5</th><th>6</th><th>7</th><th>8</th>
<td class="green" rowspan="2">736 g</td>
<td class="green" rowspan="2">29.1%</td>
<td class="green" rowspan="2">0%</td>
</tr>

<tr>
<td class="auto"></td>
<td class="auto"></td>
<td class="auto"></td>
<td class="auto"></td>
</tr>

</table>
</div>
</body>
</html>
